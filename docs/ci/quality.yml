name: quality

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and eval test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[eval]"

      - name: Run public-safe quality preflight
        run: python scripts/quality_preflight.py --format text
