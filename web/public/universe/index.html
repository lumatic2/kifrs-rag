  orbit.rotation.y = hash01(`${n.id}:tilt`) * .75 - .38;
  const inner = ringMesh(r * .58, .36, "#FAF6EE", .16);
  inner.rotation.x = Math.PI * .47;
  inner.rotation.z = hash01(`${n.id}:inner`) * Math.PI;
  group.add(orbit, inner, spriteLabel(label.title, "#FAF6EE", r * .66, 12, label.sub));
  return group;
}

function makeSystemField(n) {
  const color = HIER_COLOR.system;
  const group = new THREE.Group();
  const r = 19 + hash01(n.id) * 5;
  const label = hierarchyLabel(n);
  const active = activatedNodeIds.has(n.id) || focusedNodeId === n.id || hoveredNodeId === n.id;
  const orbit = ringMesh(r, .45, color, .56);
  orbit.rotation.x = Math.PI * .52;
  const marker = ringMesh(r * .46, .28, "#FAF6EE", active ? .34 : .14);
  marker.rotation.x = Math.PI * .2;
  marker.rotation.y = Math.PI * .62;
  group.add(orbit, marker);
  if (showLabels) group.add(spriteLabel(label.title, "#FAF6EE", r * .72, 8.5, label.sub));
  return group;
}

function setGlowOpacity(mesh, opacity) {
  if (!mesh?.material) return;
  mesh.userData.baseOpacity = opacity;
  mesh.userData.amp = Math.min(0.045, opacity * .45);
  mesh.material.opacity = opacity;
}

function updateNodeObjectStyle(group, n) {
  if (!group || !n) return;
  const p = group.userData.parts;
  if (!p) return;
  const selected = focusedNodeId === n.id;
  const neighbor = isFocusedDirectNeighbor(n.id);
  const hovered = hoveredNodeId === n.id;
  const typeActive = isTypeHighlightedNode(n.id);
  const typeDimmed = highlightedNodeTypes.size && !typeActive;
  const active = selected || neighbor || hovered || typeActive;
  const color = p.color || colorOf(n.type);
  const cue = p.cue || nodeDepthCue(n);
  const star = p.starPower || nodeStarPower(n);
  const burst = nodeBurstPower(star);
  const coreColor = selected || hovered ? "#F58F6E" : color;
  if (p.core?.material) {
    p.core.material.color.set(threeColor(coreColor));
    p.core.material.emissive.set(threeColor(coreColor));
    p.core.material.emissiveIntensity = selected || hovered ? .98 : typeActive ? .82 : neighbor ? .66 + star * .18 : .34 + star * .5;
    p.core.material.opacity = (typeDimmed ? .32 : active ? 1 : .86 + star * .1) * cue.opacity;
  }
  const dimScale = typeDimmed ? .2 : 1;
  setGlowOpacity(p.innerHalo, (active ? .16 : .065 + star * .055) * cue.glow * dimScale);
  setGlowOpacity(p.outerHalo, (active ? .095 + star * .05 : .028 + star * .07) * cue.glow * dimScale);
  setGlowOpacity(p.majorHalo, (p.major ? (active ? .12 + star * .05 : .048 + star * .07) : star * .055) * cue.glow * dimScale);
  setGlowOpacity(p.stellarHalo, (active ? .055 : .026) * star * cue.glow * dimScale);
  setGlowOpacity(p.starBurst, (active ? .58 : .34) * Math.pow(burst, .82) * cue.glow * dimScale);
  setGlowOpacity(p.selectedHalo, selected || hovered ? .2 * cue.glow : 0);
  setGlowOpacity(p.neighborHalo, neighbor ? .075 * cue.glow : typeActive ? .055 * cue.glow : 0);
  group.userData.active = active;
}

function makeRealNode3D(n) {
  const color = colorOf(n.type);
  const group = new THREE.Group();
  const r = Math.max(.65, Math.min(1.65, radius(n) * .15));
  const major = isMajorNode(n);
  const cue = nodeDepthCue(n);
  const starPower = nodeStarPower(n);
  const burstPower = nodeBurstPower(starPower);
  const core = new THREE.Mesh(new THREE.SphereGeometry(r * (1 + starPower * .08), 16, 10), litMaterial(color, { opacity:(.82 + starPower * .08) * cue.opacity, emissive:.28 + starPower * .38, roughness:.46, metalness:.1 }));
  const innerHalo = haloMesh(r * (1.62 + starPower * .32), color, (.052 + starPower * .034) * cue.glow);
  const outerHalo = haloMesh(r * (2.45 + starPower * .72), color, (.022 + starPower * .042) * cue.glow);
  const majorHalo = haloMesh(r * (3.45 + starPower * 1.1), color, (major ? .034 : 0) * cue.glow);
  const stellarHalo = haloMesh(r * (4.8 + starPower * 2.6), "#FAF6EE", .018 * starPower * cue.glow);
  const starBurst = starBurstSprite(r * (9 + starPower * 13), "#FAF6EE", .18 * Math.pow(burstPower, .82) * cue.glow);
  const selectedHalo = haloMesh(r * 3.7, "#F58F6E", 0);
  const neighborHalo = haloMesh(r * 2.8, color, 0);
  group.add(starBurst, stellarHalo, core, innerHalo, outerHalo, majorHalo, selectedHalo, neighborHalo);
  group.userData.depthScale = cue.scale;
  group.userData.parts = { core, innerHalo, outerHalo, majorHalo, stellarHalo, starBurst, selectedHalo, neighborHalo, color, cue, major, starPower };
  updateNodeObjectStyle(group, n);
  return group;
}

function createThreeNode(n) {
  if (!THREE || !isInteractiveNode(n)) return undefined;
  const role = hierRole(n);
  const obj = makeRealNode3D(n);
  obj.add(hitTargetMesh(n, role));
  obj.userData = { ...obj.userData, kind:"nodeGroup", id:n.id, role, baseScale:obj.userData.depthScale || 1, active:!!obj.userData.active, phase:hash01(n.id) * Math.PI * 2, speed:.65 + hash01(`${n.id}:pulse`) * .55 };
  return obj;
}

function hitTargetMesh(n, role) {
  const hitRadius = role === "galaxy" ? 18 : role === "cluster" ? 12 : role === "system" ? 8 : Math.max(6, Math.min(12, radius(n) * 2.4));
  const hit = new THREE.Mesh(
    new THREE.SphereGeometry(hitRadius, 12, 8),
    new THREE.MeshBasicMaterial({ transparent:true, opacity:0, depthWrite:false })
  );
  hit.userData = { kind:"hit" };
  return hit;
}

function linkVisibility(l) {
  if (isHierarchyLink(l)) return false;
  if (isRelHighlightedEdge(l)) return true;
  if (isTypeHighlightedEdge(l)) return true;
  if (focusedNodeId) return activatedEdgeKeys.has(edgeKey(l.source, l.target)) || currentZoom > 0.75;
  if (layout === "overview") return overviewEdgeVisible(l);
  if (layout === "topic" || layout === "cluster") return currentZoom > 0.42 || importantEdge(l);
  return true;
}

function linkColor(l) {
  const base = relOf(l.rel).color;
  const active = activatedEdgeKeys.has(edgeKey(l.source, l.target));
  const typeActive = isTypeHighlightedEdge(l);
  if (focusedNodeId && !active) return hexA(base, .085);
  if (active) return hexA(base, .72);
  if (isRelHighlightedEdge(l)) return hexA(base, .74);
  if (typeActive) return hexA(base, .7);
  if (highlightedRels.size) return hexA(base, .055);
  if (highlightedNodeTypes.size) return hexA(base, .055);
  if (isIndexContainerEdge(l)) return hexA(base, layout === "overview" ? .12 : .2);
  if (layout === "overview") return hexA(base, l.rel === "link" ? .13 : .2);
  if (l.rel === "contains") return hexA(base, structureLayout() ? 0.11 : 0.18);
  if (l.rel === "near-miss" || l.rel === "similar") return hexA(base, structureLayout() ? 0.12 : 0.24);
  return hexA(base, structureLayout() ? (currentZoom > 0.72 ? 0.42 : 0.22) : 0.5);
}

function linkWidth(l) {
  const active = activatedEdgeKeys.has(edgeKey(l.source, l.target));
  if (focusedNodeId && !active) return 0.16;
  if (active) return 0.28;
  if (isRelHighlightedEdge(l)) return 0.28;
  if (isTypeHighlightedEdge(l)) return 0.28;
  if (isHierarchyLink(l)) return 0;
  if (isIndexContainerEdge(l)) return layout === "overview" ? .16 : .24;
  if (layout === "overview") return importantEdge(l) ? .2 : .12;
  if (l.rel === "near-miss" || l.rel === "similar") return Math.max(0.1, (l.weight || 0.6) * (structureLayout() ? 0.16 : 0.32));
  return structureLayout() ? (currentZoom > 0.85 ? 0.22 : 0.16) : .32;
}

function structureLayout() {
  return layout === "overview" || layout === "topic" || layout === "cluster";
}

function importantEdge(l) {
  const s = byId[nodeIdOf(l.source)], t = byId[nodeIdOf(l.target)];
  const d = (deg[nodeIdOf(l.source)] || 0) + (deg[nodeIdOf(l.target)] || 0);
  return l.rel === "supports" || l.rel === "extends" || l.rel === "requires" ||
    l.rel === "refines" || l.rel === "instantiates" || l.rel === "contradicts" ||
    l.rel === "triggered-by" || l.rel === "composes" ||
    (s && t && (s.type === "thesis" || t.type === "thesis")) ||
    (s && t && (s.type === "topic" || t.type === "topic")) ||
    d >= 42;
}

function overviewEdgeVisible(l) {
  if (activatedEdgeKeys.has(edgeKey(l.source, l.target))) return true;
  if (l.rel === "near-miss" || l.rel === "similar") return importantEdge(l) || currentZoom > 0.58;
  if (l.rel === "mentions" || l.rel === "related") return importantEdge(l) || currentZoom > 0.56;
  if (l.rel === "link") return importantEdge(l) && currentZoom > 0.46;
  return importantEdge(l);
}

function updateHud() {
  const focus = document.getElementById("hud-focus");
  const note = document.getElementById("hud-note");
  const act = document.getElementById("hud-activation");
  if (focus) focus.textContent = focusedLabel;
  if (note) note.textContent = activationLabel || (focusedNodeId ? "직접 연결된 기억과 선을 밝히는 중입니다." : "노드를 선택하면 주변 연결이 빛납니다.");
  if (act) {
    act.textContent = `${activatedNodeIds.size}개 노드 점등`;
    act.classList.toggle("show", activatedNodeIds.size > 0);
  }
  document.querySelectorAll(".focus-pill").forEach(el => el.classList.toggle("on", el.dataset.focus === focusedNodeId));
}

function selectNode(id, opts = {}) {
  const n = byId[id];
  if (!n) return;
  focusedNodeId = id;
  focusedLabel = n.label || id;
  const direct = new Set([id]);
  const edgeKeys = new Set();
  DATA.edges.forEach(e => {
    const s = nodeIdOf(e.source), t = nodeIdOf(e.target);
    if (s === id || t === id) {
      direct.add(s); direct.add(t); edgeKeys.add(edgeKey(s, t));
    }
  });
  activatedNodeIds.clear();
  activatedEdgeKeys.clear();
  direct.forEach(x => activatedNodeIds.add(x));
  edgeKeys.forEach(x => activatedEdgeKeys.add(x));
  const role = hierRole(n);
  activationLabel = opts.label || (role === "star"
    ? `${focusedLabel}와 직접 연결된 기억을 강조했습니다.`
    : `${focusedLabel}와 직접 연결된 지식권을 강조했습니다.`);
  updateHud();
  refreshActivationStyles();
}

function clearSelection() {
  const prevHover = hoveredNodeId;
  focusedNodeId = null;
  hoveredNodeId = null;
  focusedLabel = "K-IFRS 기준서 우주";
  activationLabel = "";
  activatedNodeIds.clear();
  activatedEdgeKeys.clear();
  setNodeHoverVisual(prevHover, false);
  if (threeState?.renderer?.domElement) threeState.renderer.domElement.style.cursor = "";
  updateHud();
  closePanel();
  refreshActivationStyles();
}

function selectHierarchyRegion(id) {
  const n = byId[id];
  if (!n || !isHier(n)) return;
  const h = n.hierarchy || {};
  const role = hierRole(n);
  const ids = DATA.nodes.filter(x => {
    if (isHier(x) || !x.hierarchy) return false;
    if (role === "galaxy") return x.hierarchy.galaxy === h.galaxy;
    if (role === "cluster") return x.hierarchy.galaxy === h.galaxy && x.hierarchy.cluster === h.cluster;
    if (role === "system") return x.hierarchy.galaxy === h.galaxy && x.hierarchy.cluster === h.cluster && x.hierarchy.system === h.system;
    return false;
  }).map(x => x.id);
  const label = hierarchyLabel(n);
  focusedNodeId = id;
  focusedLabel = label.title;
  setActivation(ids, `${label.title}에 속한 기준서·절 ${ids.length}개를 밝혔습니다.`);
}

function focusNode(id, opts = {}) {
  const n = byId[id];
  const x = finiteCoord(n, "x");
  const y = finiteCoord(n, "y");
  const z = finiteCoord(n, "z");
  if (!n || !window.__G || !Number.isFinite(x) || !Number.isFinite(y)) return;
  const role = hierRole(n);
  focusedNodeId = id;
  focusedLabel = n.label || id;
  activationLabel = opts.intro ? "기준서 우주로 진입했습니다. 기준서·절을 선택하면 연결이 밝아집니다."
    : role === "star" ? `${focusedLabel} 기억으로 이동`
    : `${focusedLabel} 영역으로 이동`;
  updateHud();
  const zoom = opts.zoom ?? (role === "galaxy" ? 1.15 : role === "cluster" ? 1.75 : 2.4);
  if (graphMode3D && window.__G.cameraPosition) {
    const dist = role === "galaxy" ? 620 : role === "cluster" ? 360 : role === "system" ? 240 : 155;
    const side = hash01(id) > .5 ? 1 : -1;
    window.__G.cameraPosition(
      { x:x + side * dist * .62, y:y + dist * .22, z:z + dist },
      { x, y, z },
      opts.ms ?? 1100
    );
  } else if (window.__G.centerAt && window.__G.zoom) {
    window.__G.centerAt(x, y, opts.ms ?? 1100).zoom(zoom, opts.ms ?? 1100);
  }
  refreshActivationStyles();
}

function setActivation(ids, label = "") {
  activatedNodeIds.clear();
  activatedEdgeKeys.clear();
  ids.filter(Boolean).forEach(id => activatedNodeIds.add(id));
  if (activatedNodeIds.size) {
    DATA.edges.forEach(e => {
      const s = nodeIdOf(e.source), t = nodeIdOf(e.target);
      if (activatedNodeIds.has(s) && activatedNodeIds.has(t)) activatedEdgeKeys.add(edgeKey(s, t));
      else if (e.rel === "contains" && (activatedNodeIds.has(s) || activatedNodeIds.has(t))) activatedEdgeKeys.add(edgeKey(s, t));
    });
  }
  activationLabel = label;
  updateHud();
  refreshActivationStyles();
}

function activationFromQuestion(q) {
  const raw = q.toLowerCase().replace(/[^\p{L}\p{N}\s]/gu, " ");
  const terms = raw.split(/\s+/).filter(t => t.length >= 2).slice(0, 8);
  if (!terms.length) return [];
  return DATA.nodes
    .filter(n => !isHier(n))
    .map(n => {
      const hay = [n.label, n.domain, ...(n.tags || [])].filter(Boolean).join(" ").toLowerCase();
      const score = terms.reduce((s, t) => s + (hay.includes(t) ? 1 : 0), 0);
      return { id: n.id, score };
    })
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score || (deg[b.id] || 0) - (deg[a.id] || 0))
    .slice(0, 12)
    .map(x => x.id);
}

function nodeGlow(ctx, x, y, r, c, scale, alpha = .24) {
  const g = ctx.createRadialGradient(x, y, r * .4, x, y, r * 2.25);
  g.addColorStop(0, hexA(c, alpha));
  g.addColorStop(1, hexA(c, 0));
  ctx.beginPath(); ctx.arc(x, y, r * 2.25, 0, 2 * Math.PI); ctx.fillStyle = g; ctx.fill();
}

function drawPlanetNode(ctx, n, r, c, scale) {
  nodeGlow(ctx, n.x, n.y, r, c, scale, .2);
  const g = ctx.createRadialGradient(n.x - r * .35, n.y - r * .45, r * .1, n.x, n.y, r * 1.25);
  g.addColorStop(0, "rgba(250,246,238,.9)");
  g.addColorStop(.38, c);
  g.addColorStop(1, hexA(c, .48));
  ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, 2 * Math.PI); ctx.fillStyle = g; ctx.fill();
  ctx.lineWidth = 1.1 / scale; ctx.strokeStyle = hexA(c, .78); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(n.x, n.y + r * .08, r * 1.2, r * .38, -.18, Math.PI * .05, Math.PI * .95);
  ctx.lineWidth = .95 / scale; ctx.strokeStyle = "rgba(3,7,17,.54)"; ctx.stroke();
}

function drawCrystalNode(ctx, n, r, c, scale) {
  nodeGlow(ctx, n.x, n.y, r, c, scale, .18);
  ctx.beginPath();
  ctx.moveTo(n.x, n.y - r * 1.25); ctx.lineTo(n.x + r * 1.05, n.y);
  ctx.lineTo(n.x, n.y + r * 1.25); ctx.lineTo(n.x - r * 1.05, n.y); ctx.closePath();
  ctx.fillStyle = hexA(c, .88); ctx.fill();
  ctx.lineWidth = 1 / scale; ctx.strokeStyle = hexA(c, .95); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(n.x, n.y - r * 1.25); ctx.lineTo(n.x, n.y + r * 1.25);
  ctx.moveTo(n.x - r * 1.05, n.y); ctx.lineTo(n.x + r * 1.05, n.y);
  ctx.moveTo(n.x, n.y - r * 1.25); ctx.lineTo(n.x - r * .42, n.y);
  ctx.moveTo(n.x, n.y + r * 1.25); ctx.lineTo(n.x + r * .42, n.y);
  ctx.lineWidth = .75 / scale; ctx.strokeStyle = "rgba(250,246,238,.48)"; ctx.stroke();
}

function drawMechanismNode(ctx, n, r, c, scale) {
  nodeGlow(ctx, n.x, n.y, r, c, scale, .16);
  const teeth = 10;
  ctx.save(); ctx.translate(n.x, n.y); ctx.rotate(hash01(n.id) * Math.PI);
  for (let i = 0; i < teeth; i++) {
    const a = i / teeth * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r * 1.05, Math.sin(a) * r * 1.05);
    ctx.lineTo(Math.cos(a) * r * 1.34, Math.sin(a) * r * 1.34);
    ctx.lineWidth = 1.3 / scale; ctx.strokeStyle = hexA(c, .82); ctx.stroke();
  }
  ctx.restore();
  ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, 2 * Math.PI); ctx.fillStyle = CANVAS_BG; ctx.fill();
  ctx.lineWidth = 1.8 / scale; ctx.strokeStyle = hexA(c, .92); ctx.stroke();
  ctx.beginPath(); ctx.arc(n.x, n.y, r * .42, 0, 2 * Math.PI); ctx.fillStyle = hexA(c, .84); ctx.fill();
}

function drawCometNode(ctx, n, r, c, scale) {
  const a = hash01(n.id) * Math.PI * 2;
  const tx = n.x - Math.cos(a) * r * 1.7, ty = n.y - Math.sin(a) * r * 1.7;
  ctx.beginPath();
  ctx.moveTo(tx - Math.sin(a) * r * .46, ty + Math.cos(a) * r * .46);
  ctx.quadraticCurveTo(n.x - Math.cos(a) * r * .95, n.y - Math.sin(a) * r * .95, n.x, n.y);
  ctx.quadraticCurveTo(n.x - Math.cos(a) * r * .95, n.y - Math.sin(a) * r * .95, tx + Math.sin(a) * r * .46, ty - Math.cos(a) * r * .46);
  ctx.closePath(); ctx.fillStyle = hexA(c, .2); ctx.fill();
  nodeGlow(ctx, n.x, n.y, r, c, scale, .2);
  const g = ctx.createRadialGradient(n.x - r * .28, n.y - r * .34, r * .08, n.x, n.y, r);
  g.addColorStop(0, "rgba(250,246,238,.82)"); g.addColorStop(.45, c); g.addColorStop(1, hexA(c, .64));
  ctx.beginPath(); ctx.arc(n.x, n.y, r * .92, 0, 2 * Math.PI); ctx.fillStyle = g; ctx.fill();
}

function drawSealNode(ctx, n, r, c, scale) {
  nodeGlow(ctx, n.x, n.y, r, c, scale, .16);
  const pts = 6;
  ctx.beginPath();
  for (let i = 0; i <= pts; i++) {
    const a = -Math.PI / 2 + i / pts * Math.PI * 2;
    const x = n.x + Math.cos(a) * r * 1.12, y = n.y + Math.sin(a) * r * 1.12;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.fillStyle = hexA(c, .82); ctx.fill();
  ctx.lineWidth = 1 / scale; ctx.strokeStyle = hexA(c, .95); ctx.stroke();
  ctx.beginPath(); ctx.arc(n.x, n.y, r * .52, 0, 2 * Math.PI);
  ctx.fillStyle = "rgba(3,7,17,.42)"; ctx.fill();
  ctx.lineWidth = .8 / scale; ctx.strokeStyle = "rgba(250,246,238,.42)"; ctx.stroke();
}

function drawOrbitNode(ctx, n, r, c, scale) {
  nodeGlow(ctx, n.x, n.y, r, c, scale, .18);
  const a = hash01(n.id) * Math.PI * 2;
  ctx.save(); ctx.translate(n.x, n.y); ctx.rotate(a);
  ctx.beginPath(); ctx.ellipse(0, 0, r * 1.75, r * .72, -.28, 0, 2 * Math.PI);
  ctx.lineWidth = .85 / scale; ctx.strokeStyle = hexA(c, .72); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(0, 0, r * 1.42, r * .54, .72, 0, 2 * Math.PI);
  ctx.lineWidth = .65 / scale; ctx.strokeStyle = hexA(c, .38); ctx.stroke();
  ctx.beginPath(); ctx.arc(r * 1.45, 0, Math.max(1.4 / scale, r * .16), 0, 2 * Math.PI);
  ctx.fillStyle = "rgba(250,246,238,.86)"; ctx.fill();
  ctx.restore();
  const g = ctx.createRadialGradient(n.x - r * .28, n.y - r * .35, r * .08, n.x, n.y, r);
  g.addColorStop(0, "rgba(250,246,238,.8)"); g.addColorStop(.5, c); g.addColorStop(1, hexA(c, .56));
  ctx.beginPath(); ctx.arc(n.x, n.y, r * .78, 0, 2 * Math.PI); ctx.fillStyle = g; ctx.fill();
}

function drawPebbleNode(ctx, n, r, c, scale) {
  const seed = hash01(n.id);
  ctx.beginPath();
  for (let i = 0; i <= 7; i++) {
    const a = -Math.PI / 2 + i / 7 * Math.PI * 2;
    const rr = r * (.88 + hash01(`${n.id}:${i}`) * .28);
    const x = n.x + Math.cos(a) * rr, y = n.y + Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath(); ctx.fillStyle = hexA(c, .78); ctx.fill();
  ctx.lineWidth = .9 / scale; ctx.strokeStyle = hexA(c, .9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(n.x - r * .38, n.y - r * .05 + seed); ctx.lineTo(n.x + r * .45, n.y - r * .16);
  ctx.moveTo(n.x - r * .22, n.y + r * .28); ctx.lineTo(n.x + r * .3, n.y + r * .18);
  ctx.lineWidth = .7 / scale; ctx.strokeStyle = "rgba(250,246,238,.34)"; ctx.stroke();
}

function drawNode(n, ctx, scale) {
  if (!Number.isFinite(n.x) || !Number.isFinite(n.y)) return;
  if (isHier(n)) return drawHierarchyNode(n, ctx, scale);
  const m = metaOf(n.type), c = m.color, r = radius(n);
  ctx.save();
  if (m.glyph === "planet") drawPlanetNode(ctx, n, r, c, scale);
  else if (m.glyph === "crystal") drawCrystalNode(ctx, n, r, c, scale);
  else if (m.glyph === "mechanism") drawMechanismNode(ctx, n, r, c, scale);
  else if (m.glyph === "comet") drawCometNode(ctx, n, r, c, scale);
  else if (m.glyph === "seal") drawSealNode(ctx, n, r, c, scale);
  else if (m.glyph === "orbit") drawOrbitNode(ctx, n, r, c, scale);
  else drawPebbleNode(ctx, n, r, c, scale);
  const typeActive = isTypeHighlightedNode(n.id);
  if (activatedNodeIds.has(n.id) || focusedNodeId === n.id || typeActive) {
    const isFocus = focusedNodeId === n.id;
    ctx.beginPath(); ctx.arc(n.x, n.y, r + (isFocus ? 7 : 4) / scale, 0, 2 * Math.PI);
    ctx.lineWidth = (isFocus ? 2.2 : 1.4) / scale;
    ctx.strokeStyle = isFocus ? "rgba(245,143,110,.95)" : typeActive ? "rgba(127,205,181,.8)" : "rgba(250,246,238,.72)";
    ctx.stroke();
  }
  const labelGate = structureLayout() ? 1.05 : 0.55;
  if (showLabels && scale > labelGate) {
    const fs = 11 / scale;
    ctx.font = `${fs}px -apple-system,"Apple SD Gothic Neo",sans-serif`;
    ctx.textAlign = "left"; ctx.textBaseline = "middle"; ctx.lineJoin = "round";
    const tx = n.x + r + 5 / scale, ty = n.y;
    ctx.lineWidth = 3 / scale; ctx.strokeStyle = "rgba(3,7,17,.94)"; ctx.strokeText(n.label, tx, ty);
    ctx.fillStyle = CANVAS_INK; ctx.fillText(n.label, tx, ty);
  }
  ctx.restore();
}

function drawHierarchyNode(n, ctx, scale) {
  if (!Number.isFinite(n.x) || !Number.isFinite(n.y)) return;
  const role = hierRole(n), r = radius(n), c = HIER_COLOR[role] || "#f58f6e";
  ctx.save();
  ctx.globalAlpha = role === "galaxy" ? .9 : .82;
  if (role === "galaxy") {
    const grd = ctx.createRadialGradient(n.x, n.y, r * .2, n.x, n.y, r * 3.25);
    grd.addColorStop(0, hexA(c, .26));
    grd.addColorStop(.5, hexA(c, .1));
    grd.addColorStop(1, hexA(c, 0));
    ctx.beginPath(); ctx.arc(n.x, n.y, r * 3.25, 0, 2 * Math.PI); ctx.fillStyle = grd; ctx.fill();
    ctx.beginPath(); ctx.arc(n.x, n.y, r * 1.18, 0, 2 * Math.PI); ctx.lineWidth = 1.2 / scale; ctx.strokeStyle = hexA(c, .28); ctx.stroke();
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, 2 * Math.PI); ctx.lineWidth = 1.8 / scale; ctx.strokeStyle = hexA(c, .84); ctx.stroke();
  } else if (role === "cluster") {
    ctx.beginPath(); ctx.arc(n.x, n.y, r * 1.72, 0, 2 * Math.PI); ctx.setLineDash([5 / scale, 5 / scale]);
    ctx.lineWidth = 1.4 / scale; ctx.strokeStyle = hexA(c, .8); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(n.x, n.y, r * .78, 0, 2 * Math.PI); ctx.fillStyle = hexA(c, .18); ctx.fill();
    ctx.lineWidth = 1.4 / scale; ctx.strokeStyle = hexA(c, .9); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, 2 * Math.PI); ctx.fillStyle = CANVAS_BG; ctx.fill();
    ctx.lineWidth = 1.5 / scale; ctx.strokeStyle = hexA(c, .78); ctx.stroke();
  }
  if (focusedNodeId === n.id || activatedNodeIds.has(n.id)) {
    ctx.beginPath(); ctx.arc(n.x, n.y, r * (role === "galaxy" ? 1.52 : 1.35), 0, 2 * Math.PI);
    ctx.lineWidth = 2 / scale; ctx.strokeStyle = "rgba(245,143,110,.88)"; ctx.stroke();
  }
  if (showLabels && (role !== "system" || scale > .95)) {
    const fs = (role === "galaxy" ? 15 : role === "cluster" ? 12 : 10) / scale;
    ctx.font = `${fs}px -apple-system,"Apple SD Gothic Neo",sans-serif`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    const ty = n.y - r - (role === "galaxy" ? 16 : 10) / scale;
    ctx.lineWidth = 3 / scale; ctx.strokeStyle = "rgba(3,7,17,.95)"; ctx.strokeText(n.label, n.x, ty);
    ctx.fillStyle = role === "galaxy" ? "#F6F1E8" : "rgba(246,241,232,.88)"; ctx.fillText(n.label, n.x, ty);
  }
  ctx.restore();
}

function applyFilter() {
  const nodes = DATA.nodes.slice();
  const vis = new Set(nodes.map(n => n.id));
  const links = DATA.edges
    .filter(e => !isHierarchyLink(e) && vis.has(e.source) && vis.has(e.target))
    .map(e => ({ source: e.source, target: e.target, rel: e.rel, weight: e.weight }));
  Graph.graphData({ nodes, links });
  graphRefreshNodes();
  document.getElementById("stat").textContent = `기준서·절 ${nodes.filter(n => !isHier(n)).length} · 연결 ${links.length}`;
}

// ── 렌즈 5모드 ── 전체=low-clutter overview / 토픽별=hierarchy / 클러스터별=domain / 주장별=thesis/domain / 시간순=date x축
function setLayout(mode) {
  layout = mode;
  document.querySelectorAll("#seg-layout button").forEach(b => b.classList.toggle("on", b.dataset.m === mode));
  const ns = DATA.nodes;
  if (mode === "overview") {
    applyMixedOverviewLayout(ns);
  } else if (mode === "topic") {
    applyCosmicLayout(ns);
  } else if (mode === "cluster") {
    applyClusterLayout(ns);
  } else if (mode === "thesis") {
    const doms = [...new Set(ns.map(n => n.domain || "기타"))];
    const span = 300;
    ns.forEach(n => {
      n.fx = (doms.indexOf(n.domain || "기타") - (doms.length - 1) / 2) * span;
      n.fy = null;
      n.fz = graphMode3D ? (hash01(n.id) - .5) * 260 : null;
    });
  } else if (mode === "time") {
    const ds = ns.map(n => n.date).filter(Boolean).sort();
    const lo = +new Date(ds[0] || "2026-01-01"), hi = +new Date(ds[ds.length - 1] || "2026-12-31") || lo + 1;
    ns.forEach(n => {
      const t = n.date ? (+new Date(n.date) - lo) / (hi - lo || 1) : 0.5;
      n.fx = (t - 0.5) * 900; n.fy = null; n.fz = graphMode3D ? (hash01(n.id) - .5) * 220 : null;
    });
  }
  Graph.d3ReheatSimulation();
  let fitted = false;
  Graph.onEngineStop(() => { if (!fitted) { fitted = true; Graph.zoomToFit(500, structureLayout() ? FIT_PADDING : 70); } });
}

function applyMixedOverviewLayout(ns) {
  const real = ns.filter(n => hierRole(n) === "star");
  const realIds = new Set(real.map(n => n.id));
  const links = (DATA?.edges || []).filter(e => !isHierarchyLink(e) && realIds.has(e.source) && realIds.has(e.target));
  const centerScale = 460;
  real.forEach((n, i) => {
    const a = hash01(`${n.id}:overview-angle`) * Math.PI * 2;
    const ring = Math.sqrt((i + 1) / Math.max(1, real.length));
    const jitter = hash01(`${n.id}:overview-radius`) * 120;
    n.fx = Math.cos(a) * (120 + ring * centerScale + jitter);
    n.fy = Math.sin(a) * (105 + ring * centerScale + jitter * .8);
    n.fz = graphMode3D ? (hash01(`${n.id}:overview-depth`) - .5) * 420 : 0;
  });
  ns.filter(n => hierRole(n) !== "star").forEach((n, i, arr) => {
    const role = hierRole(n);
    const a = (i / Math.max(1, arr.length)) * Math.PI * 2 + hash01(n.id) * .6;
    const rad = role === "galaxy" ? 760 : role === "cluster" ? 650 : 560;
    n.fx = Math.cos(a) * rad;
    n.fy = Math.sin(a) * rad * .82;
    n.fz = graphMode3D ? (role === "galaxy" ? -260 : -180) + (hash01(`${n.id}:overview`) - .5) * 90 : 0;
  });
  const weights = {
    "thesis-tag": .105,
    "topic-tag": .1,
    "extends": .085,
    "requires": .08,
    "supports": .09,
    "refines": .08,
    "composes": .075,
    "contradicts": .065,
    "near-miss": .052,
    "similar": .052
  };
  const desired = {
    "thesis-tag": 88,
    "topic-tag": 98,
    "extends": 112,
    "requires": 118,
    "supports": 110,
    "refines": 112,
    "composes": 120,
    "contradicts": 145,
    "near-miss": 155,
    "similar": 155
  };
  const byNode = new Map(real.map(n => [n.id, n]));
  for (let step = 0; step < 130; step++) {
    links.forEach(e => {
      const a = byNode.get(e.source);
      const b = byNode.get(e.target);
      if (!a || !b) return;
      const dx = b.fx - a.fx;
      const dy = b.fy - a.fy;
      const dz = (b.fz || 0) - (a.fz || 0);
      const dist = Math.max(1, Math.hypot(dx, dy, dz));
      const mixedTypeBoost = a.type && b.type && a.type !== b.type ? 1.28 : .9;
      const k = (weights[e.rel] || .045) * mixedTypeBoost;
      const delta = Math.max(-18, Math.min(18, (dist - (desired[e.rel] || 132)) * k));
      const mx = dx / dist * delta;
      const my = dy / dist * delta;
      const mz = dz / dist * delta * .56;
      a.fx += mx; a.fy += my; a.fz = (a.fz || 0) + mz;
      b.fx -= mx; b.fy -= my; b.fz = (b.fz || 0) - mz;
    });
    for (let i = 0; i < real.length; i++) {
      const a = real[i];
      a.fx *= .992;
      a.fy *= .992;
      a.fz = (a.fz || 0) * .997;
      for (let j = i + 1; j < real.length; j++) {
        const b = real[j];
        const dx = b.fx - a.fx;
        const dy = b.fy - a.fy;
        const dz = (b.fz || 0) - (a.fz || 0);
        const dist = Math.max(1, Math.hypot(dx, dy, dz));
        const minDist = 22 + Math.min(18, radius(a) + radius(b));
        if (dist >= minDist) continue;
        const push = (minDist - dist) * .22;
        const mx = dx / dist * push;
        const my = dy / dist * push;
        const mz = dz / dist * push * .45;
        a.fx -= mx; a.fy -= my; a.fz = (a.fz || 0) - mz;
        b.fx += mx; b.fy += my; b.fz = (b.fz || 0) + mz;
      }
    }
  }
  applyTopicCoreDistribution(ns, { radius: graphMode3D ? 76 : 64, depth: graphMode3D ? 34 : 0 });
  applyVolumetricDepth(ns, { depth: 330, topicDepth: 54 });
  applyMajorSpineDistribution(ns, links);
}

function applyMajorSpineDistribution(ns, links) {
  const real = ns.filter(n => hierRole(n) === "star");
  const byNode = new Map(real.map(n => [n.id, n]));
  real.forEach(n => { delete n.__spineRank; delete n.__spineHubId; });
  const typeBoost = { thesis:34, semantic:20, episodic:12, proof:10, topic:4 };
  const spine = real
    .filter(n => !isPublicTopicNode(n) && !isIndexContainerNode(n) && ((deg[n.id] || 0) >= 8 || ["thesis", "semantic", "episodic"].includes(n.type)))
    .sort((a, b) => {
      const score = n => (deg[n.id] || 0) * 2.4 + (typeBoost[n.type] || 0) + Math.min(22, (layoutHints[n.id]?.bridgeScore || 0) * 2.2);
      return score(b) - score(a) || String(a.id).localeCompare(String(b.id));
    })
    .slice(0, 8);
  if (spine.length < 2) return;
  const spineIds = new Set(spine.map(n => n.id));
  const span = 500;
  spine.forEach((n, rank) => {
    const t = rank / Math.max(1, spine.length - 1) - .5;
    const lane = rank % 2 ? 1 : -1;
    n.fx = lane * (18 + hash01(`${n.id}:spine-x`) * 34);
    n.fy = t * span;
    n.fz = graphMode3D ? (hash01(`${n.id}:spine-z`) - .5) * 112 : 0;
    n.__spineRank = rank;
  });
  const assignments = new Map();
  const relationWeight = { supports:10, extends:9, requires:8, refines:8, instantiates:8, composes:7, contradicts:6, "thesis-tag":6, "topic-tag":5 };
  links.forEach(edge => {
    const source = byNode.get(nodeIdOf(edge.source));
    const target = byNode.get(nodeIdOf(edge.target));
    if (!source || !target) return;
    const sourceSpine = spineIds.has(source.id);
    const targetSpine = spineIds.has(target.id);
    if (sourceSpine === targetSpine) return;
    const hub = sourceSpine ? source : target;
    const neighbor = sourceSpine ? target : source;
    if (isPublicTopicNode(neighbor)) return;
    const score = (relationWeight[edge.rel] || 3) + (deg[hub.id] || 0) * .08;
    const previous = assignments.get(neighbor.id);
    if (!previous || score > previous.score) assignments.set(neighbor.id, { hub, neighbor, score });
  });
  const buckets = new Map(spine.map(n => [n.id, []]));
  assignments.forEach(item => buckets.get(item.hub.id)?.push(item.neighbor));
  buckets.forEach((neighbors, hubId) => {
    const hub = byNode.get(hubId);
    neighbors.sort((a, b) => String(a.id).localeCompare(String(b.id)));
    neighbors.forEach((n, i) => {
      const angle = i / Math.max(1, neighbors.length) * Math.PI * 2 + hash01(`${n.id}:spine-angle`) * .7;
      const radiusValue = 88 + Math.sqrt(neighbors.length) * 13 + hash01(`${n.id}:spine-radius`) * 72;
      const targetX = hub.fx + Math.cos(angle) * radiusValue;
      const targetY = hub.fy + Math.sin(angle) * radiusValue * .62;
      const targetZ = (hub.fz || 0) + (graphMode3D ? (hash01(`${n.id}:spine-depth`) - .5) * 150 : 0);
      n.fx = lerp(n.fx || 0, targetX, .68);
      n.fy = lerp(n.fy || 0, targetY, .68);
      n.fz = lerp(n.fz || 0, targetZ, .62);
      n.__spineHubId = hubId;
    });
  });
}

function applyCosmicLayout(ns, opts = {}) {
  const galaxies = ns.filter(n => hierRole(n) === "galaxy");
  const clusters = ns.filter(n => hierRole(n) === "cluster");
  const systems = ns.filter(n => hierRole(n) === "system");
  const pos = {};
  const realNodes = ns.filter(n => hierRole(n) === "star");
  const galaxyCounts = {};
  const clusterCounts = {};
  const systemCounts = {};
  realNodes.forEach(n => {
    const h = n.hierarchy || {};
    const g = h.galaxy || "unknown";
    const c = `${g}/${h.cluster || "unknown"}`;
    const s = `${c}/${h.system || "general"}`;
    galaxyCounts[g] = (galaxyCounts[g] || 0) + 1;
    clusterCounts[c] = (clusterCounts[c] || 0) + 1;
    systemCounts[s] = (systemCounts[s] || 0) + 1;
  });

  galaxies.forEach((n, i) => {
    const h = n.hierarchy || {};
    if (h.center) {
      n.fx = 0;
      n.fy = 0;
      n.fz = graphMode3D ? -140 : 0;
      pos[n.id] = { x:n.fx, y:n.fy, z:n.fz };
      return;
    }
    const a = Number.isFinite(+h.angle) ? +h.angle : (i / Math.max(1, galaxies.length)) * 2 * Math.PI;
    const count = galaxyCounts[h.galaxy] || galaxyCounts[n.id.replace("hier/galaxy/", "")] || 1;
    const sourceRadius = Number.isFinite(+h.radius) && +h.radius > 0 ? +h.radius * 1.65 : HIER_DIST.galaxy;
    const rad = (Math.max(HIER_DIST.galaxy, sourceRadius) + Math.sqrt(count) * 34) * (opts.galaxyScale || 1);
    n.fx = Math.cos(a) * rad * 1.22;
    n.fy = Math.sin(a) * rad * .9;
    n.fz = graphMode3D
      ? Math.sin(a * 1.35) * HIER_DIST.galaxyDepth + (i - (galaxies.length - 1) / 2) * 170
      : 0;
    pos[n.id] = { x:n.fx, y:n.fy, z:n.fz };
  });

  const clustersByGalaxy = {};
  clusters.forEach(n => {
    const g = n.hierarchy && n.hierarchy.galaxy || "unknown";
    (clustersByGalaxy[g] = clustersByGalaxy[g] || []).push(n);
  });
  Object.values(clustersByGalaxy).forEach(arr => arr.forEach((n, i) => {
    const parent = pos[n.hierarchy.parent] || pos[`hier/galaxy/${n.hierarchy.galaxy}`] || { x:0, y:0 };
    const a = (i / Math.max(1, arr.length)) * 2 * Math.PI + .35;
    const count = clusterCounts[`${n.hierarchy.galaxy}/${n.hierarchy.cluster}`] || 1;
    const rad = (HIER_DIST.clusterBase + Math.sqrt(count) * HIER_DIST.clusterStep + arr.length * 34) * (opts.clusterScale || 1);
    n.fx = parent.x + Math.cos(a) * rad;
    n.fy = parent.y + Math.sin(a) * rad;
    n.fz = (parent.z || 0)
      + Math.sin(a * 1.7) * HIER_DIST.clusterDepth
      + (hash01(`${n.id}:cluster-depth`) - .5) * 120;
    pos[n.id] = { x:n.fx, y:n.fy, z:n.fz };
  }));
  applyClusterPairCompression(clusters, pos, opts);

  const systemsByCluster = {};
  systems.forEach(n => {
    const c = n.hierarchy && n.hierarchy.cluster || "unknown";
    const key = `${n.hierarchy && n.hierarchy.galaxy || "unknown"}/${c}`;
    (systemsByCluster[key] = systemsByCluster[key] || []).push(n);
  });
  Object.values(systemsByCluster).forEach(arr => arr.forEach((n, i) => {
    const parent = pos[n.hierarchy.parent] || pos[`hier/cluster/${n.hierarchy.galaxy}/${n.hierarchy.cluster}`] || { x:0, y:0 };
    const a = (i / Math.max(1, arr.length)) * 2 * Math.PI + .22;
    const count = systemCounts[`${n.hierarchy.galaxy}/${n.hierarchy.cluster}/${n.hierarchy.system}`] || 1;
    const rad = (HIER_DIST.systemBase + Math.sqrt(count) * HIER_DIST.systemStep + arr.length * 18) * (opts.systemScale || 1);
    n.fx = parent.x + Math.cos(a) * rad;
    n.fy = parent.y + Math.sin(a) * rad;
    n.fz = (parent.z || 0)
      + Math.cos(a * 1.3) * HIER_DIST.systemDepth
      + (hash01(`${n.id}:system-depth`) - .5) * 90;
    pos[n.id] = { x:n.fx, y:n.fy, z:n.fz };
  }));

  const starsBySystem = {};
  ns.filter(n => hierRole(n) === "star").forEach(n => {
    const h = n.hierarchy || {};
    const key = `${h.galaxy || "unknown"}/${h.cluster || "unknown"}/${h.system || "general"}`;
    (starsBySystem[key] = starsBySystem[key] || []).push(n);
  });
  Object.values(starsBySystem).forEach(arr => {
    const localMaxDeg = Math.max(1, ...arr.map(n => deg[n.id] || 0));
    arr.forEach((n, i) => {
    const h = n.hierarchy || {};
    const parent = pos[`hier/system/${h.galaxy}/${h.cluster}/${h.system}`] || pos[`hier/cluster/${h.galaxy}/${h.cluster}`] || { x:0, y:0 };
    const clusterParent = pos[`hier/cluster/${h.galaxy}/${h.cluster}`] || parent;
    const galaxyParent = pos[`hier/galaxy/${h.galaxy}`] || clusterParent;
    const jitter = hash01(n.id) * Math.PI * 2;
    const a = (i / Math.max(1, arr.length)) * 2 * Math.PI + jitter * .17;
    const compact = opts.compactStars ? .44 : 1;
    const hint = layoutHints[n.id] || {};
    const localHub = clamp01(((deg[n.id] || 0) - 3) / Math.max(1, localMaxDeg - 3));
    const hubPower = Math.max(localHub * .74, nodeStarPower(n) * .88);
    const degreePull = clamp01(((deg[n.id] || 0) - 8) / 34) * (opts.compactStars ? .26 : .12);
    const bridgePull = clamp01((hint.bridgeScore || 0) / 18) * (opts.compactStars ? .36 : .16);
    const hubShellPull = hubPower * (opts.compactStars ? .22 : .1);
    const shell = Math.max(opts.compactStars ? .32 : .72, 1 - degreePull - bridgePull - hubShellPull);
    const rad = (HIER_DIST.starBase + Math.sqrt(arr.length) * HIER_DIST.starStep + hash01(n.label || n.id) * HIER_DIST.starJitter) * compact * shell;
    const clusterPull = clamp01((hint.crossCluster || 0) / 12) * (opts.compactStars ? .2 : .08);
    const galaxyPull = clamp01((hint.crossGalaxy || 0) / 9) * (opts.compactStars ? .18 : .06);
    const bridgeBeltPull = clamp01(((hint.crossGalaxy || 0) - 2) / 12) * (opts.compactStars ? .48 : .1);
    const centerPull = clamp01((hint.crossGalaxy || 0) / 14) * (opts.compactStars ? .12 : .03);
    const hubCenterPull = hubPower * (opts.compactStars ? .16 : .06);
    const depthScale = lerp(opts.compactStars ? .34 : .9, opts.compactStars ? .16 : .48, hubPower);
    let x = parent.x + Math.cos(a) * rad;
    let y = parent.y + Math.sin(a) * rad;
    let z = (parent.z || 0)
      + (hash01(`${n.id}:depth`) - .5) * HIER_DIST.starDepth * depthScale
      + Math.sin(a * 2.1) * lerp(58, 22, hubPower);
    x = lerp(x, parent.x || 0, hubCenterPull);
    y = lerp(y, parent.y || 0, hubCenterPull);
    z = lerp(z, parent.z || 0, hubCenterPull * .85);
    x = lerp(x, clusterParent.x || 0, clusterPull);
    y = lerp(y, clusterParent.y || 0, clusterPull);
    z = lerp(z, clusterParent.z || 0, clusterPull * .7);
    x = lerp(x, galaxyParent.x || 0, galaxyPull);
    y = lerp(y, galaxyParent.y || 0, galaxyPull);
    z = lerp(z, galaxyParent.z || 0, galaxyPull * .6);
    const lane = hash01(`${h.galaxy}/${h.cluster}:bridge-lane`) - .5;
    const gx = galaxyParent.x || 0;
    const gy = galaxyParent.y || 0;
    const len = Math.max(1, Math.hypot(gx, gy));
    const bridgeX = gx * .32 + (-gy / len) * lane * 150;
    const bridgeY = gy * .32 + (gx / len) * lane * 150;
    const bridgeZ = (galaxyParent.z || 0) * .24 + lane * 70;
    x = lerp(x, bridgeX, bridgeBeltPull);
    y = lerp(y, bridgeY, bridgeBeltPull);
    z = lerp(z, bridgeZ, bridgeBeltPull * .75);
    const targetSystem = hint.dominantSystem && hint.dominantSystem !== hierarchyKey(n, "system")
      ? pos[`hier/system/${hint.dominantSystem}`]
      : null;
    const targetCluster = hint.dominantCluster && hint.dominantCluster !== hierarchyKey(n, "cluster")
      ? pos[`hier/cluster/${hint.dominantCluster}`]
      : null;
    const relationTarget = targetSystem || targetCluster;
    if (relationTarget) {
      const targetWeight = targetSystem ? hint.dominantSystemWeight : hint.dominantClusterWeight;
      const targetShare = targetSystem ? hint.dominantSystemShare : hint.dominantClusterShare;
      const basePull = .12 + clamp01((targetWeight || 0) / 4.8) * .3;
      const dominance = clamp01(((targetShare || 0) - .34) / .66);
      const focusedTopicBoost = n.type === "topic" && (deg[n.id] || 0) <= 8 ? 1.28 : 1;
      const dominantPull = basePull * dominance * focusedTopicBoost * (opts.compactStars ? 1 : .38);
      x = lerp(x, relationTarget.x || 0, dominantPull);
      y = lerp(y, relationTarget.y || 0, dominantPull);
      z = lerp(z, relationTarget.z || 0, dominantPull * .72);
    }
    const domainSystemTarget = hint.domainSystem && hint.domainSystem !== hierarchyKey(n, "system")
      ? pos[`hier/system/${hint.domainSystem}`]
      : null;
    const domainClusterTarget = hint.domainCluster && hint.domainCluster !== hierarchyKey(n, "cluster")
      ? pos[`hier/cluster/${hint.domainCluster}`]
      : null;
    const domainTarget = domainSystemTarget || domainClusterTarget;
    if (isAgentDomainCandidate(n) && domainTarget && (hint.domainSystemWeight || hint.domainClusterWeight || 0) >= .9) {
      const targetWeight = domainSystemTarget ? hint.domainSystemWeight : hint.domainClusterWeight;
      const targetShare = domainSystemTarget ? hint.domainSystemShare : hint.domainClusterShare;
      const confidence = clamp01(((targetShare || 0) - .28) / .62);
      const strength = (.24 + clamp01((targetWeight || 0) / 5.5) * .34) * confidence * (opts.compactStars ? 1 : .42);
      const systemAnchor = parent || { x:0, y:0, z:0 };
      const midway = {
        x: lerp(systemAnchor.x || 0, domainTarget.x || 0, .58),
        y: lerp(systemAnchor.y || 0, domainTarget.y || 0, .58),
        z: lerp(systemAnchor.z || 0, domainTarget.z || 0, .48)
      };
      x = lerp(x, midway.x, strength);
      y = lerp(y, midway.y, strength);
      z = lerp(z, midway.z, strength * .78);
    }
    const expertSystemTarget = hint.expertSystem && hint.expertSystem !== hierarchyKey(n, "system")
      ? pos[`hier/system/${hint.expertSystem}`]
      : null;
    const expertClusterTarget = hint.expertCluster && hint.expertCluster !== hierarchyKey(n, "cluster")
      ? pos[`hier/cluster/${hint.expertCluster}`]
      : null;
    const expertTarget = expertSystemTarget || expertClusterTarget;
    if (isExpertNetworkCandidate(n) && expertTarget && (hint.expertSystemWeight || hint.expertClusterWeight || 0) >= 1) {
      const targetWeight = expertSystemTarget ? hint.expertSystemWeight : hint.expertClusterWeight;
      const targetShare = expertSystemTarget ? hint.expertSystemShare : hint.expertClusterShare;
      const confidence = clamp01(((targetShare || 0) - .18) / .64);
      const ownGalaxy = hierarchyKey(n, "galaxy");
      const crossAi = ownGalaxy === "ai-building" || (hint.expertSystem || "").startsWith("ai-building/");
      const strength = (.18 + clamp01((targetWeight || 0) / 4.8) * .24) * confidence * (crossAi ? 1.16 : .82) * (opts.compactStars ? 1 : .42);
      const corridor = {
        x: lerp(parent.x || 0, expertTarget.x || 0, crossAi ? .52 : .42),
        y: lerp(parent.y || 0, expertTarget.y || 0, crossAi ? .52 : .42),
        z: lerp(parent.z || 0, expertTarget.z || 0, crossAi ? .46 : .36)
      };
      x = lerp(x, corridor.x, strength);
      y = lerp(y, corridor.y, strength);
      z = lerp(z, corridor.z, strength * .72);
    }
    const indexSystemTarget = hint.indexSystem && hint.indexSystem !== hierarchyKey(n, "system")
      ? pos[`hier/system/${hint.indexSystem}`]
      : null;
    const indexClusterTarget = hint.indexCluster && hint.indexCluster !== hierarchyKey(n, "cluster")
      ? pos[`hier/cluster/${hint.indexCluster}`]
      : null;
    const indexTarget = indexSystemTarget || indexClusterTarget;
    if (isIndexContainerNode(n) && indexTarget && (hint.indexSystemWeight || hint.indexClusterWeight || 0) >= 1) {
      const targetWeight = indexSystemTarget ? hint.indexSystemWeight : hint.indexClusterWeight;
      const targetShare = indexSystemTarget ? hint.indexSystemShare : hint.indexClusterShare;
      const confidence = clamp01(((targetShare || 0) - .2) / .62);
      const strength = (.3 + clamp01((targetWeight || 0) / 7.2) * .34) * confidence * (opts.compactStars ? 1 : .42);
      const corridor = {
        x: lerp(parent.x || 0, indexTarget.x || 0, .62),
        y: lerp(parent.y || 0, indexTarget.y || 0, .62),
        z: lerp(parent.z || 0, indexTarget.z || 0, .5)
      };
      x = lerp(x, corridor.x, strength);
      y = lerp(y, corridor.y, strength);
      z = lerp(z, corridor.z, strength * .78);
    }
    const projectPairSystemTarget = hint.projectPairSystem && hint.projectPairSystem !== hierarchyKey(n, "system")
      ? pos[`hier/system/${hint.projectPairSystem}`]
      : null;
    const projectPairClusterTarget = hint.projectPairCluster && hint.projectPairCluster !== hierarchyKey(n, "cluster")
      ? pos[`hier/cluster/${hint.projectPairCluster}`]
      : null;
    const projectPairTarget = projectPairSystemTarget || projectPairClusterTarget;
    if (isProjectNode(n) && !isProjectBridgeCandidate(n) && projectPairTarget && (hint.projectPairSystemWeight || hint.projectPairClusterWeight || 0) >= 1) {
      const targetWeight = projectPairSystemTarget ? hint.projectPairSystemWeight : hint.projectPairClusterWeight;
      const targetShare = projectPairSystemTarget ? hint.projectPairSystemShare : hint.projectPairClusterShare;
      const confidence = clamp01(((targetShare || 0) - .2) / .6);
      const strength = (.28 + clamp01((targetWeight || 0) / 3.8) * .28) * confidence * (opts.compactStars ? 1 : .42);
      const corridor = {
        x: lerp(parent.x || 0, projectPairTarget.x || 0, .5),
        y: lerp(parent.y || 0, projectPairTarget.y || 0, .5),
        z: lerp(parent.z || 0, projectPairTarget.z || 0, .42)
      };
      x = lerp(x, corridor.x, strength);
      y = lerp(y, corridor.y, strength);
      z = lerp(z, corridor.z, strength * .74);
    }
    const projectSystemTarget = hint.projectBridgeSystem && hint.projectBridgeSystem !== hierarchyKey(n, "system")
      ? pos[`hier/system/${hint.projectBridgeSystem}`]
      : null;
    const projectClusterTarget = hint.projectBridgeCluster && hint.projectBridgeCluster !== hierarchyKey(n, "cluster")
      ? pos[`hier/cluster/${hint.projectBridgeCluster}`]
      : null;
    const projectTarget = projectSystemTarget || projectClusterTarget;
    if (isProjectBridgeCandidate(n) && projectTarget && (hint.projectBridgeSystemWeight || hint.projectBridgeClusterWeight || 0) >= 1) {
      const targetWeight = projectSystemTarget ? hint.projectBridgeSystemWeight : hint.projectBridgeClusterWeight;
      const targetShare = projectSystemTarget ? hint.projectBridgeSystemShare : hint.projectBridgeClusterShare;
      const confidence = clamp01(((targetShare || 0) - .22) / .58);
      const strength = (.34 + clamp01((targetWeight || 0) / 4.2) * .28) * confidence * (opts.compactStars ? 1 : .45);
      const corridorBias = hierarchyKey(n, "galaxy") === "writing-thought" ? .54 : .46;
      const corridor = {
        x: lerp(parent.x || 0, projectTarget.x || 0, corridorBias),
        y: lerp(parent.y || 0, projectTarget.y || 0, corridorBias),
        z: lerp(parent.z || 0, projectTarget.z || 0, .44)
      };
      x = lerp(x, corridor.x, strength);
      y = lerp(y, corridor.y, strength);
      z = lerp(z, corridor.z, strength * .76);
    }
    n.fx = lerp(x, 0, centerPull);
    n.fy = lerp(y, 0, centerPull);
    n.fz = lerp(z, 0, centerPull * .35);
    });
  });
  applyOverSeriesFamilyLayout(ns, opts);
  applyOverviewRelationMixing(ns, opts);
  applyTopicCoreDistribution(ns, {
    radius: opts.compactStars ? 68 : 82,
    depth: graphMode3D ? (opts.compactStars ? 32 : 38) : 0
  });
  applyVolumetricDepth(ns, {
    depth: opts.compactStars ? 300 : 360,
    topicDepth: opts.compactStars ? 48 : 58
  });
}

function applyOverviewRelationMixing(ns, opts = {}) {
  if (!opts.mixByLinks || !DATA?.edges) return;
  const nodes = new Map(ns.filter(n => hierRole(n) === "star").map(n => [n.id, n]));
  const weights = {
    "thesis-tag": .13,
    "topic-tag": .12,
    "extends": .1,
    "requires": .085,
    "supports": .1,
    "refines": .095,
    "composes": .08,
    "contradicts": .075,
    "near-miss": .055,
    "similar": .055
  };
  const desired = {
    "thesis-tag": 180,
    "topic-tag": 190,
    "extends": 165,
    "requires": 170,
    "supports": 165,
    "refines": 165,
    "composes": 175,
    "contradicts": 200,
    "near-miss": 250,
    "similar": 250
  };
  const edges = DATA.edges
    .filter(e => weights[e.rel] && nodes.has(e.source) && nodes.has(e.target))
    .sort((a, b) => (weights[b.rel] || 0) - (weights[a.rel] || 0));
  for (let pass = 0; pass < 5; pass++) {
    edges.forEach(e => {
      const a = nodes.get(e.source);
      const b = nodes.get(e.target);
      if (!a || !b) return;
      const dx = (b.fx || 0) - (a.fx || 0);
      const dy = (b.fy || 0) - (a.fy || 0);
      const dz = (b.fz || 0) - (a.fz || 0);
      const dist = Math.max(1, Math.hypot(dx, dy, dz));
      const mixedTypeBoost = a.type && b.type && a.type !== b.type ? 1.32 : .82;
      const strength = (weights[e.rel] || .05) * mixedTypeBoost;
      const delta = Math.max(-34, Math.min(34, (dist - (desired[e.rel] || 210)) * strength));
      const mx = dx / dist * delta;
      const my = dy / dist * delta;
      const mz = dz / dist * delta;
      a.fx += mx; a.fy += my; a.fz += mz * .72;
      b.fx -= mx; b.fy -= my; b.fz -= mz * .72;
    });
  }
  nodes.forEach(n => {
    const hub = nodeStarPower(n);
    const centerPull = .035 + hub * .035;
    n.fx = lerp(n.fx, 0, centerPull);
    n.fy = lerp(n.fy, 0, centerPull);
    n.fz = lerp(n.fz || 0, 0, centerPull * .42);
  });
}

function isPublicTopicNode(n) {
  return !!n && hierRole(n) === "star" && n.type === "topic" && String(n.id || "").startsWith("10-Resources/topics/");
}

function applyTopicCoreDistribution(ns, opts = {}) {
  const topics = ns
    .filter(isPublicTopicNode)
    .sort((a, b) => {
      const ad = deg[a.id] || 0;
      const bd = deg[b.id] || 0;
      if (bd !== ad) return bd - ad;
      return String(a.label || a.id).localeCompare(String(b.label || b.id), "ko");
    });
  if (!topics.length) return;
  const ring = opts.radius ?? 76;
  const depth = opts.depth ?? 34;
  const start = -Math.PI / 2;
  const maxDeg = Math.max(1, ...topics.map(n => deg[n.id] || 0));
  topics.forEach((n, i) => {
    const t = topics.length === 1 ? 0 : i / topics.length;
    const a = start + t * Math.PI * 2;
    const hub = clamp01((deg[n.id] || 0) / maxDeg);
    const localRing = ring * lerp(.98, .36, hub);
    const stagger = (i % 2 ? 1 : -1) * 7;
    const target = {
      x: Math.cos(a) * localRing + Math.cos(a + Math.PI / 2) * stagger,
      y: Math.sin(a) * localRing * .72 + Math.sin(a + Math.PI / 2) * stagger * .72,
      z: graphMode3D ? Math.sin(a * 1.7) * depth + (i - (topics.length - 1) / 2) * 6 : 0
    };
    n.fx = lerp(n.fx || 0, target.x, .88);
    n.fy = lerp(n.fy || 0, target.y, .88);
    n.fz = lerp(n.fz || 0, target.z, .82);
  });
  for (let pass = 0; pass < 3; pass++) {
    for (let i = 0; i < topics.length; i++) {
      for (let j = i + 1; j < topics.length; j++) {
        const a = topics[i], b = topics[j];
        const dx = (b.fx || 0) - (a.fx || 0);
        const dy = (b.fy || 0) - (a.fy || 0);
        const dz = (b.fz || 0) - (a.fz || 0);
        const dist = Math.max(1, Math.hypot(dx, dy, dz));
        const minDist = 42;
        if (dist >= minDist) continue;
        const push = (minDist - dist) * .46;
        const mx = dx / dist * push;
        const my = dy / dist * push;
        const mz = dz / dist * push;
        a.fx -= mx; a.fy -= my; a.fz = (a.fz || 0) - mz * .72;
        b.fx += mx; b.fy += my; b.fz = (b.fz || 0) + mz * .72;
      }
    }
    topics.forEach(n => {
      n.fx = lerp(n.fx || 0, 0, .035);
      n.fy = lerp(n.fy || 0, 0, .035);
      n.fz = lerp(n.fz || 0, 0, .025);
    });
  }
}

function applyVolumetricDepth(ns, opts = {}) {
  if (!graphMode3D) return;
  const real = ns.filter(n => hierRole(n) === "star");
  if (!real.length) return;
  const depth = opts.depth ?? 320;
  const topicDepth = opts.topicDepth ?? 52;
  real.forEach(n => {
    const topic = isPublicTopicNode(n);
    const radial = Math.hypot(n.fx || 0, n.fy || 0);
    const hub = nodeStarPower(n);
    const h = hash01(`${n.id}:volume`);
    const lane = (hash01(`${n.type || "x"}:${n.domain || ""}:lane`) - .5) * 2;
    const orbital = Math.sin(radial * .027 + h * Math.PI * 2) * 58;
    const spread = ((h - .5) * depth + lane * 72 + orbital) * lerp(1.08, .6, hub);
    const target = topic
      ? (hash01(`${n.id}:topic-volume`) - .5) * topicDepth
      : spread;
    n.fz = lerp(n.fz || 0, target, topic ? .42 : .64);
  });
  const zs = real.map(n => n.fz || 0).sort((a, b) => a - b);
  const median = zs[Math.floor(zs.length / 2)] || 0;
  real.forEach(n => { n.fz = (n.fz || 0) - median; });
}

function applyOverSeriesFamilyLayout(ns, opts = {}) {
  const family = ns.filter(n => hierRole(n) === "star" && isOverSeriesNode(n));
  const anchor = family.find(n => n.id === "30-Projects/over-series/README.md");
  if (!anchor || family.length <= 1) return;
  const children = family
    .filter(n => n !== anchor)
    .sort((a, b) => {
      const aConcept = /\/concepts\//.test(a.id) ? 1 : 0;
      const bConcept = /\/concepts\//.test(b.id) ? 1 : 0;
      if (aConcept !== bConcept) return aConcept - bConcept;
      return String(a.id).localeCompare(String(b.id));
    });
  const compact = opts.compactStars ? .74 : 1;
  const innerRadius = 150 * compact;
  const outerRadius = 230 * compact;
  const depth = graphMode3D ? 70 * compact : 0;
  children.forEach((n, i) => {
    const isConcept = /\/concepts\//.test(n.id);
    const ringChildren = children.filter(x => /\/concepts\//.test(x.id) === isConcept);
    const ringIndex = ringChildren.findIndex(x => x.id === n.id);
    const ringCount = Math.max(1, ringChildren.length);
    const start = isConcept ? -Math.PI * .72 : Math.PI * .18;
    const angle = start + (ringIndex / ringCount) * Math.PI * 2 + hash01(n.id) * .12;
    const radius = (isConcept ? outerRadius : innerRadius) * lerp(.9, 1.08, hash01(`${n.id}:over-radius`));
    const target = {
      x: anchor.fx + Math.cos(angle) * radius,
      y: anchor.fy + Math.sin(angle) * radius * .72,
      z: (anchor.fz || 0) + (isConcept ? Math.sin(angle * 1.3) : Math.cos(angle)) * depth
    };
    const bridgeAllowance = isProjectBridgeCandidate(n) ? .46 : 1;
    const strength = (opts.compactStars ? .88 : .72) * bridgeAllowance;
    n.fx = lerp(n.fx, target.x, strength);
    n.fy = lerp(n.fy, target.y, strength);
    n.fz = lerp(n.fz || 0, target.z || 0, strength * .82);
  });
}

function applyClusterLayout(ns) {
  const groups = {};
  ns.filter(n => hierRole(n) === "star").forEach(n => {
    const key = (n.hierarchy && n.hierarchy.galaxy) || n.domain || "기타";
    (groups[key] = groups[key] || []).push(n);
  });
  const ordered = Object.entries(groups).sort((a, b) => b[1].length - a[1].length);
  const centers = {};
  ordered.forEach(([key, arr], i) => {
    const a = i / Math.max(1, ordered.length) * Math.PI * 2 - Math.PI / 2;
    const ring = 520 + Math.sqrt(arr.length) * 22;
    centers[key] = { x:Math.cos(a) * ring * 1.25, y:Math.sin(a) * ring * .88, z:graphMode3D ? Math.sin(a * 1.4) * 260 : 0 };
  });
  ns.forEach(n => {
    if (hierRole(n) === "galaxy") {
      const key = (n.hierarchy && n.hierarchy.galaxy) || n.label || "기타";
      const c = centers[key] || { x:0, y:0, z:0 };
      n.fx = c.x; n.fy = c.y; n.fz = c.z;
      return;
    }
    const key = (n.hierarchy && n.hierarchy.galaxy) || n.domain || "기타";
    const c = centers[key] || { x:0, y:0, z:0 };
    const idx = (groups[key] || []).findIndex(x => x.id === n.id);
    const a = (idx < 0 ? hash01(n.id) : idx / Math.max(1, groups[key].length)) * Math.PI * 2 + hash01(n.id) * .4;
    const rad = n.hierarchy_virtual ? 80 : 130 + Math.sqrt((groups[key] || []).length) * 12 + hash01(n.label || n.id) * 70;
    n.fx = c.x + Math.cos(a) * rad;
    n.fy = c.y + Math.sin(a) * rad;
    n.fz = (c.z || 0) + (graphMode3D ? (hash01(`${n.id}:cluster`) - .5) * 240 : 0);
  });
}

function esc(v) {
  return String(v ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
  }[ch]));
}

function setText(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value || "";
}

function setSectionText(wrapId, textId, value) {
  const wrap = document.getElementById(wrapId);
  const text = document.getElementById(textId);
  const has = !!String(value || "").trim();
  wrap.hidden = !has;
  if (text) text.textContent = has ? value : "";
}

function renderSourceCard(card) {
  if (!card || typeof card !== "object") return "";
  const bits = [card.type, card.domain, card.date, card.support_type].filter(Boolean).map(esc);
  const urls = []
    .concat(card.url || [])
    .concat(card.urls || [])
    .filter(Boolean)
    .slice(0, 3);
  const labels = []
    .concat(card.source_label || [])
    .concat(card.source_labels || [])
    .filter(Boolean)
    .slice(0, 3);
  return [
    `<strong>${esc(card.title || "Public source")}</strong>`,
    bits.length ? `<div class="source-meta">${bits.join(" · ")}</div>` : "",
    labels.length ? `<div class="source-meta">${labels.map(esc).join(" · ")}</div>` : "",
    urls.map((url, idx) => `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">Source ${idx + 1}</a>`).join(" ")
  ].join("");
}

function groupConnectedByRel(n) {
  const groups = new Map();
  DATA.edges
    .filter(e => e.source === n.id || e.target === n.id)
    .forEach(e => {
      const other = e.source === n.id ? e.target : e.source;
      const target = byId[other];
      if (!target || !isInteractiveNode(target)) return;
      const rel = e.rel || "related";
      if (!groups.has(rel)) groups.set(rel, []);
      if (!groups.get(rel).some(x => x.id === other)) groups.get(rel).push({ id: other, node: target });
    });
  return Array.from(groups.entries()).sort((a, b) => b[1].length - a[1].length || a[0].localeCompare(b[0]));
}

function renderConnectedGroups(n) {
  const groups = groupConnectedByRel(n);
  if (!groups.length) return '<span style="color:var(--mut)">없음</span>';
  return groups.map(([rel, items]) => {
    const meta = relOf(rel);
    const chips = items
      .slice(0, 14)
      .map(x => `<button type="button" class="chip" data-jump="${esc(x.id)}">${esc(x.node.label || x.id)}</button>`)
      .join("");
    const rest = items.length > 14 ? `<span class="chip rel">+${items.length - 14}</span>` : "";
    return `<div class="rel-group"><div class="rel-group-title" style="color:${meta.color}">${esc(meta.ko)} · ${esc(rel)} · ${items.length}</div>${chips}${rest}</div>`;
  }).join("");
}

function renderNodeDetail(n) {
  const shortTitle = n.short_ko_title || n.label;
  setText("p-short", shortTitle);
  setText("p-title", n.label);
  setText("p-specific-ko", n.specific_ko_title && n.specific_ko_title !== n.label ? n.specific_ko_title : "");
  setText("p-specific-en", n.specific_en_title || "");
  const m = metaOf(n.type);
  setText("p-meta", [`${m.ko}(${n.type})`, n.domain, n.date, n.id].filter(Boolean).join("  ·  "));
  document.getElementById("p-tags").innerHTML = (n.tags || []).map(t => `<span class="chip rel">#${esc(t)}</span>`).join("");
  setSectionText("p-body-ko-wrap", "p-body-ko", n.body_ko || "");
  setSectionText("p-body-en-wrap", "p-body-en", n.body_en || "");
  const sourceHtml = renderSourceCard(n.source_card);
  document.getElementById("p-source-wrap").hidden = !sourceHtml;
  document.getElementById("p-source-card").innerHTML = sourceHtml;
  document.getElementById("p-links").innerHTML = renderConnectedGroups(n);
}

let focusSequence = 0;
const focusMotionState = { nodeId:null, timelineActive:false, reducedMotion:false, sequence:0 };

function prefersReducedMotion() {
  return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
}

function killFocusTimeline() {
  if (focusTimeline) {
    focusTimeline.kill();
    focusTimeline = null;
  }
  if (window.gsap && threeState) window.gsap.killTweensOf([threeState.camera?.position, threeState.controls?.target].filter(Boolean));
  focusMotionState.timelineActive = false;
}

function applyImmediateDetailState(panel, open) {
  const side = document.getElementById("side");
  const graph = document.getElementById("graph");
  if (open) {
    panel.style.transform = "translateX(0)";
    panel.style.opacity = "1";
    panel.style.visibility = "visible";
    side.style.opacity = ".62";
    graph.style.opacity = ".96";
  } else {
    panel.style.transform = "translateX(100%)";
    panel.style.opacity = "0";
    panel.style.visibility = "hidden";
    side.style.opacity = "1";
    graph.style.opacity = "1";
  }
}

function runDetailFocus(n) {
  const panel = document.getElementById("panel");
  const side = document.getElementById("side");
  const graph = document.getElementById("graph");
  const wasOpen = panel.classList.contains("open");
  const reduced = prefersReducedMotion();
  const sequence = ++focusSequence;
  killFocusTimeline();
  focusMotionState.nodeId = n.id;
  focusMotionState.reducedMotion = reduced;
  focusMotionState.sequence = sequence;
  panel.classList.add("open");
  panel.setAttribute("aria-hidden", "false");
  document.body.classList.add("detail-open");
  panel.scrollTop = 0;

  if (!window.gsap || reduced) {
    applyImmediateDetailState(panel, true);
    return;
  }

  const gsap = window.gsap;
  if (!wasOpen) gsap.set(panel, { xPercent:100, autoAlpha:0 });
  else gsap.set(panel, { visibility:"visible" });
  focusMotionState.timelineActive = true;
  focusTimeline = gsap.timeline({
    defaults:{ ease:"power3.out", overwrite:"auto" },
    onComplete:() => {
      if (focusMotionState.sequence === sequence) focusMotionState.timelineActive = false;
    }
  });
  focusTimeline
    .to(panel, { xPercent:0, autoAlpha:1, duration:wasOpen ? .24 : .5 }, wasOpen ? 0 : .06)
    .to(side, { opacity:.62, duration:.42 }, 0)
    .to(graph, { opacity:.96, duration:.42 }, 0);
}

function openPanel(n) {
  if (!isInteractiveNode(n)) return;
  selectNode(n.id);
  renderNodeDetail(n);
  runDetailFocus(n);
}
function jump(id) { const n = byId[id]; if (!n) return; openPanel(n);
  selectNode(id, { label:"인용된 기억과 직접 연결을 강조했습니다." }); }
function closePanel() {
  const panel = document.getElementById("panel");
  const side = document.getElementById("side");
  const graph = document.getElementById("graph");
  const reduced = prefersReducedMotion();
  const sequence = ++focusSequence;
  killFocusTimeline();
  focusMotionState.nodeId = null;
  focusMotionState.reducedMotion = reduced;
  focusMotionState.sequence = sequence;
  const finish = () => {
    panel.classList.remove("open");
    panel.setAttribute("aria-hidden", "true");
    document.body.classList.remove("detail-open");
    focusMotionState.timelineActive = false;
  };
  if (!window.gsap || reduced) {
    applyImmediateDetailState(panel, false);
    finish();
    return;
  }
  focusMotionState.timelineActive = true;
  focusTimeline = window.gsap.timeline({ defaults:{ ease:"power3.out", overwrite:"auto" }, onComplete:finish })
    .to(panel, { xPercent:100, autoAlpha:0, duration:.34 }, 0)
    .to([side, graph], { opacity:1, duration:.32 }, 0);
}
document.getElementById("panel-close").addEventListener("click", closePanel);
document.addEventListener("keydown", event => {
  if (event.key === "Escape" && document.getElementById("panel").classList.contains("open")) closePanel();
});
window.__brainOpenNode = id => {
  const n = byId[id];
  if (!n) return false;
  openPanel(n);
  return true;
};
window.__brainPanelState = () => ({
  open: document.getElementById("panel").classList.contains("open"),
  title: document.getElementById("p-title").textContent,
  short: document.getElementById("p-short").textContent,
  bodyKo: document.getElementById("p-body-ko").textContent,
  bodyEn: document.getElementById("p-body-en").textContent,
  source: document.getElementById("p-source-card").textContent,
  links: document.getElementById("p-links").textContent,
});
window.__brainFocusMotionState = () => ({ ...focusMotionState });
document.getElementById("panel").addEventListener("click", e => {
  const b = e.target.closest("[data-jump]");
  if (b) jump(b.dataset.jump);
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closePanel(); });

document.getElementById("seg-layout").addEventListener("click", e => { const b = e.target.closest("button"); if (b) setLayout(b.dataset.m); });
document.getElementById("seg-space").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  charge = +b.dataset.s;
  document.querySelectorAll("#seg-space button").forEach(x => x.classList.toggle("on", x === b));
  forceCharge(graphMode3D ? charge * .58 : charge); Graph.d3ReheatSimulation();
});
document.getElementById("btn-relayout").onclick = () => {
  Graph.d3ReheatSimulation();
  let fitted = false; Graph.onEngineStop(() => { if (!fitted) { fitted = true; Graph.zoomToFit(500, 70); } });
};
document.getElementById("btn-labels").onclick = e => {
  showLabels = !showLabels; e.target.textContent = showLabels ? "라벨 숨기기" : "라벨 표시"; graphRefreshNodes();
};
document.getElementById("btn-reset").onclick = () => {
  highlightedNodeTypes.clear(); highlightedRels.clear();
  document.querySelectorAll(".leg.on").forEach(el => el.classList.remove("on"));
  applyFilter();
};
document.getElementById("side-toggle").onclick = () => document.getElementById("side").classList.toggle("open");

Object.assign(window, { closePanel, jump, focusNode });
</script>
