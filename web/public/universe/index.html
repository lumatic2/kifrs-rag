<html lang="ko">

<style>
  :root {
    --bg:#0c1512;
    --panel:#0f1a16;
    --panel-glass:rgba(15,26,22,.94);
    --surface:#152420;
    --surface-2:#1a2b25;
    --surface-3:#0d1512;
    --line:#1e2e28;
    --line-strong:#2b3f37;
    --ink:#F2F4F1;
    --mut:#8a978f;
    --primary:#3f8068;
    --accent:#be3a2b;
    --hot:#c9553d;
    --side:260px;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font:14px/1.5 Geist,"Geist Fallback","Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",sans-serif; }
  #graph { position:fixed; top:0; right:0; bottom:0; left:var(--side); transition:left .28s ease; }
  body.cinematic #graph::after { content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at 58% 44%, transparent 0 30%, rgba(10,10,10,.14) 55%, rgba(10,10,10,.42) 100%); }
  #graph-labels { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:2; }
  .node-label { position:absolute; display:flex; align-items:center; gap:0; transform:translate3d(0,0,0);
    max-width:clamp(140px, 24vw, 260px); overflow:hidden; color:rgba(250,250,250,.92); font-size:11px; font-weight:500;
    line-height:1; white-space:nowrap; text-overflow:ellipsis;
    text-shadow:0 1px 6px rgba(0,0,0,.9);
    opacity:.86; will-change:transform, opacity; }
  .node-label::before, .node-label::after { display:none; }
  .node-label.neighbor { color:rgba(250,250,250,.86); opacity:.82; }
  .node-label.active { color:#FAFAFA; opacity:.98; font-size:12px; font-weight:600; }

  #side { position:fixed; inset:0 auto 0 0; width:var(--side); z-index:5; overflow-y:auto; overflow-x:hidden;
    background:var(--panel); border-right:1px solid var(--line); padding:24px 20px 28px; transition:width .24s ease, background .24s ease; }
  #side::-webkit-scrollbar { width:0; }
  #side h1 { margin:0; font-size:18px; line-height:1.2; font-weight:600; letter-spacing:-.02em; display:flex; align-items:center; gap:8px; }
  #side h1 .logo { width:16px; height:16px; flex:none; display:block; opacity:.72; }
  #side .stat { color:var(--mut); font-size:11px; margin:8px 0 24px; font-variant-numeric:tabular-nums; }
  #side h3 { margin:28px -20px 12px; padding:28px 20px 0; border-top:1px solid var(--line);
    font-size:10px; font-weight:500; text-transform:none; letter-spacing:.02em; color:#777; }
  .leg { display:flex; align-items:center; gap:8px; min-height:28px; padding:3px 8px; border:1px solid transparent; border-radius:8px; cursor:pointer;
    font-size:11.5px; user-select:none; transition:color .18s ease, background .18s ease, opacity .18s ease; }
  .leg:hover { background:var(--surface); color:var(--ink); }
  .leg.off { opacity:.36; }
  .leg.on { background:var(--surface); color:var(--ink); border-color:var(--line-strong); }
  .leg .gl { width:14px; height:14px; flex:none; display:block; }
  .leg .ko { color:var(--ink); }
  .leg .en { color:var(--mut); font-size:11px; }
  .leg .ct { margin-left:auto; color:var(--mut); font-variant-numeric:tabular-nums; font-size:11.5px; }
  .ctrl-row { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .ctrl-row button, .seg button { flex:0 0 auto; min-height:28px; background:transparent; border:1px solid var(--line-strong); color:#777;
    border-radius:999px; padding:5px 11px; font:500 11.5px/1.2 inherit; cursor:pointer;
    transition:color .18s ease, border-color .18s ease, background .18s ease; }
  .ctrl-row button:hover, .seg button:hover { border-color:#3A3A3A; color:#BDBDBD; }
  .seg { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .seg.modes button { flex:0 0 auto; }
  .seg button.on { background:var(--surface); color:var(--ink); border-color:#333; font-weight:500; }
  #focus-list { display:flex; flex-wrap:wrap; gap:6px; }
  .focus-pill { display:inline-flex; align-items:center; gap:5px; width:auto; min-height:26px; background:transparent; border:1px solid var(--line-strong);
    color:#777; border-radius:999px; padding:4px 9px; font-size:11px; cursor:pointer; text-align:left;
    transition:color .18s ease, border-color .18s ease, background .18s ease; }
  .focus-pill:hover, .focus-pill.on { border-color:#3A3A3A; background:var(--surface); color:#D6D6D6; }
  .focus-pill .dot { width:5px; height:5px; border-radius:50%; background:var(--primary); box-shadow:none; flex:none; }
  #side .hint { color:#666; font-size:10.5px; line-height:1.55; margin-top:24px; }

  #side-toggle { display:none; position:fixed; top:12px; left:12px; z-index:7; width:38px; height:38px;
    border:1px solid var(--line-strong); border-radius:50%; background:var(--panel-glass); cursor:pointer; padding:0; }
  #side-toggle svg { display:block; margin:auto; }

  #back-link { position:fixed; top:16px; left:calc(var(--side) + 16px); z-index:6;
    color:rgba(250,250,250,.68); font-size:12.5px; text-decoration:none; letter-spacing:.01em;
    display:flex; align-items:center; gap:6px; transition:color .18s ease; }
  #back-link:hover { color:var(--ink); }
  @media (max-width: 760px) { #back-link { left:58px; } }

  #panel { position:fixed; top:0; right:0; height:100%; width:520px; max-width:42vw; z-index:8;
    background:#0D0D0D; border-left:1px solid var(--line); padding:72px 48px 52px; overflow:auto; overscroll-behavior:contain;
    visibility:hidden; opacity:0; }
  #panel.open { visibility:visible; }
  #panel .close { position:absolute; top:20px; right:24px; width:36px; height:36px; display:grid; place-items:center;
    cursor:pointer; color:#888; font-size:22px; line-height:1; background:#141414; border:1px solid var(--line-strong); border-radius:50%; }
  #panel .close:hover { color:var(--ink); border-color:#3A3A3A; }
  #panel h2 { margin:0 40px 10px 0; font-size:26px; line-height:1.16; font-weight:600; letter-spacing:-.025em; }
  #panel .meta { color:#666; font-size:10.5px; line-height:1.5; margin-bottom:24px; overflow-wrap:anywhere; }
  #panel .detail-kicker { color:#777; font-size:10px; font-weight:500; text-transform:none; letter-spacing:.02em; margin-bottom:10px; }
  #panel .detail-title-ko { color:#D8D8D8; font-size:15px; line-height:1.55; margin:8px 40px 4px 0; }
  #panel .detail-title-en { color:#777; font-size:12px; line-height:1.55; margin:0 40px 24px 0; }
  #panel .detail-section { border-top:1px solid var(--line); margin-top:28px; padding-top:24px; }
  #panel .detail-section[hidden] { display:none; }
  #panel .detail-section h3 { margin-top:0; }
  #panel .detail-copy { color:#C8C8C8; font-size:14px; line-height:1.8; white-space:pre-wrap; }
  #panel .source-card { background:#111; border:1px solid var(--line); border-radius:12px; padding:16px; }
  #panel .source-card strong { display:block; color:var(--ink); font-size:13px; font-weight:550; margin-bottom:8px; }
  #panel .source-card .source-meta { color:var(--mut); font-size:12px; line-height:1.5; }
  #panel .source-card a { display:inline-block; color:var(--accent); font-size:12px; margin-top:8px; text-decoration:none; }
  #panel .rel-group { margin-bottom:18px; }
  #panel .rel-group-title { color:var(--mut); font-size:11px; margin:0 0 8px; }
  #panel .chip { display:inline-block; background:transparent; border:1px solid var(--line-strong);
    border-radius:999px; padding:4px 10px; margin:0 6px 7px 0; font-size:11px; color:#B8B8B8; cursor:pointer; }
  #panel button.chip { font:inherit; }
  #panel .chip.rel { color:var(--mut); cursor:default; }
  #panel .chip:hover { border-color:var(--accent); color:var(--accent); }
  #panel h3 { font-size:11px; font-weight:500; text-transform:none; letter-spacing:.01em; color:#777; margin:18px 0 10px; }

  #cosmic-hud { display:none; position:fixed; top:18px; right:18px; z-index:4; width:300px; max-width:calc(100vw - var(--side) - 36px);
    pointer-events:none; color:var(--ink); }
  .hud-kicker { font-size:10.5px; text-transform:uppercase; letter-spacing:.11em; color:var(--accent); opacity:.9; }
  #hud-focus { margin-top:3px; font-size:22px; line-height:1.08; font-weight:700; letter-spacing:0; text-shadow:0 2px 18px rgba(3,7,17,.86); }
  #hud-note { margin-top:7px; color:var(--mut); font-size:12px; line-height:1.45; }
  #hud-activation { display:inline-flex; margin-top:10px; padding:4px 8px; border:1px solid rgba(245,143,110,.28);
    border-radius:999px; background:rgba(7,12,22,.62); color:var(--hot); font-size:11px; opacity:0; transition:opacity .2s; }
  #hud-activation.show { opacity:1; }

  @media (max-width: 760px) {
    #side { width:min(280px, 85vw); transform:translateX(-100%); transition:transform .22s ease; box-shadow:12px 0 32px -12px rgba(0,0,0,.5); }
    #side.open { transform:none; }
    #side-toggle { display:block; }
    #graph { left:0; }
    #cosmic-hud { top:14px; right:12px; left:58px; width:auto; max-width:none; }
    #hud-focus { font-size:17px; }
    #hud-note { display:none; }
    #panel { width:100vw; max-width:none; height:100dvh; padding:72px 22px 110px; border-left:0; }
    #panel .close { position:fixed; top:14px; right:16px; }
    #panel h2 { margin-right:36px; font-size:24px; }
    #panel .detail-title-ko, #panel .detail-title-en { margin-right:36px; }
  }
</style>
</head>
<body>

</button>

      <line x1="13" y1="11" x2="9" y2="18" stroke="#be3a2b" stroke-width="1.4"/>
      <circle cx="6" cy="6" r="2.6" fill="#3f8068"/><circle cx="18" cy="7" r="2.2" fill="#3f8068"/>
      <circle cx="9" cy="18" r="2.2" fill="#be3a2b"/><circle cx="13" cy="11" r="3" fill="#F2F4F1"/>

<script type="module">
import * as THREE from "three";
import { TrackballControls } from "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/controls/TrackballControls.js";
import { EffectComposer } from "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/postprocessing/EffectComposer.js";
import { RenderPass } from "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/postprocessing/UnrealBloomPass.js";
window.THREE = THREE;
// 노드 2종: 기준서(별) · 절(위성). 계층 가상 노드는 topic 타입.
const TYPE_META = {
  standard:{ko:"기준서", color:"#3f8068", glyph:"planet"},
  section:{ko:"절", color:"#be3a2b", glyph:"crystal"},
  topic:{ko:"영역", color:"#8a978f", glyph:"orbit"},
  unclassified:{ko:"미분류", color:"#8A8472", glyph:"pebble"},
};
// 연결 종류(rel). 방향성 있는 추론관계 + 무방향 태그/유사 연결.
const REL_META = {
  supports:{ko:"지지", color:"#A7D8C9", dir:true}, extends:{ko:"확장", color:"#AEBFDC", dir:true},
  requires:{ko:"전제", color:"#8EA6C7", dir:true}, refines:{ko:"정련", color:"#CABCDD", dir:true},
  instantiates:{ko:"구체화", color:"#B9DED4", dir:true}, contradicts:{ko:"반박", color:"#EFA3A0", dir:true},
  "triggered-by":{ko:"촉발", color:"#E9B6A4", dir:true},
  composes:{ko:"구성", color:"#CDDDA8", dir:true},
  mentions:{ko:"언급", color:"#A6B6CA", dir:true},
  related:{ko:"관련", color:"#A6B6CA", dir:true},
  contains:{ko:"포함", color:"#E5B09E", dir:true},
  "near-miss":{ko:"유사", color:"#E5C08B", dir:false},
  "topic-tag":{ko:"주제", color:"#BCC4C9", dir:false},
  "thesis-tag":{ko:"주장", color:"#DDB1C3", dir:false},
};
const metaOf = t => TYPE_META[t] || TYPE_META.unclassified;
const colorOf = t => metaOf(t).color;
const relOf = r => REL_META[r] || { ko: r || "?", color: "#8A8472", dir: false };
const hexA = (hex, a) => { const n = parseInt(hex.slice(1), 16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; };
const isHier = n => !!n.hierarchy_virtual || (n.hierarchy && n.hierarchy.role && n.hierarchy.role !== "star");
const hierRole = n => (n.hierarchy && n.hierarchy.role) || "star";
const isInteractiveNode = n => !isHier(n);
const HIER_COLOR = { galaxy:"#3f8068", cluster:"#be3a2b", system:"#cbb896" };
const CANVAS_BG = "#0c1512";
const CANVAS_INK = "rgba(250,250,250,.9)";
const EDGE_NEUTRAL = "#B8B3AA";
const hash01 = s => {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return (h >>> 0) / 4294967295;
};
const wrapAngle = a => {
  const tau = Math.PI * 2;
  return ((a + Math.PI) % tau + tau) % tau - Math.PI;
};

let DATA = null, byId = {}, stemToId = {}, Graph = null, deg = {}, hierarchyStats = {}, layoutHints = {}, clusterPairHints = [], layout = "overview", currentZoom = 1, graphMode3D = false;
let threeState = null;
let focusedNodeId = null, hoveredNodeId = null, focusedLabel = "K-IFRS 기준서 우주", activationLabel = "", introPlayed = false;
let focusTimeline = null;
const activatedNodeIds = new Set();
const activatedEdgeKeys = new Set();
Object.assign(window, { activatedNodeIds, activatedEdgeKeys });
const REL = 4;
const FIT_PADDING = 150;
const HIER_DIST = {
  galaxy: 1080,
  galaxyDepth: 620,
  clusterBase: 380,
  clusterStep: 22,
  clusterDepth: 360,
  systemBase: 210,
  systemStep: 10,
  systemDepth: 280,
  starBase: 112,
  starStep: 24,
  starJitter: 76,
  starDepth: 620
};
const stemOf = id => id.split("/").pop().replace(/\.md$/, "");
const citationStemKeys = id => {
  const parts = String(id || "").split("/").filter(Boolean);
  const fileStem = (parts.pop() || "").replace(/\.md$/i, "");
  const keys = [fileStem];
  if (/^(readme|_index|00-index)$/i.test(fileStem) && parts.length) keys.push(parts[parts.length - 1]);
  return keys.filter(Boolean).map(key => key.toLowerCase());
};
function isIndexContainerNode(n) {
  return /(^|\/)(00-INDEX|_index)\.md$/i.test(String(n?.id || ""));
}

const radius = n => {
  const role = hierRole(n);
  if (role === "galaxy") return 30;
  if (role === "cluster") return 18;
  if (role === "system") return 10;
  if (typeof n.paragraphs === "number" && n.paragraphs > 0) {
    return Math.min(6, Math.max(1.2, Math.log2(n.paragraphs + 1) * .62));
  }
  if (isIndexContainerNode(n)) return Math.min(1.4, Math.sqrt(Math.max(1, deg[n.id] * 0.1 + 1)) * .74);
  return Math.min(2.5, Math.sqrt(Math.max(1, deg[n.id] * 0.22 + 1)) * .74);
};
const isAutoLabelCandidate = n => {
  const id = String(n.id || "");
  return !isIndexContainerNode(n) && !id.startsWith("bio/");
};
const isMajorNode = n => isInteractiveNode(n) && isAutoLabelCandidate(n) && (
  (deg[n.id] || 0) >= 18 ||
  (n.type === "thesis" && (deg[n.id] || 0) >= 16) ||
  (String(n.id || "").startsWith("30-Projects/") && (deg[n.id] || 0) >= 10)
);

const highlightedNodeTypes = new Set();
const highlightedRels = new Set();
let showLabels = true, charge = -180;

fetch("./graph.json", { cache: "no-store" }).then(r => r.json()).then(g => {
  document.body.classList.add("cinematic");
  DATA = g;
  g.nodes.forEach(n => {
    byId[n.id] = n;
    citationStemKeys(n.id).forEach(key => { if (!stemToId[key]) stemToId[key] = n.id; });
    deg[n.id] = 0;
  });
  g.edges.forEach(e => { e.rel = e.rel || (e.type === "similar" ? "near-miss" : "related"); deg[e.source]++; deg[e.target]++; });
  hierarchyStats = buildHierarchyStats(g.nodes);
  layoutHints = buildLayoutHints(g.edges);
  clusterPairHints = buildClusterPairHints(g.edges);
  document.getElementById("stat").textContent = `${g.nodes.length} 노드 · ${g.edges.length} 연결`;
  buildLegends(g);
  buildFocusControls(g);
  initGraph();
  applyFilter();
  setLayout("overview");
  updateHud();
}).catch(e => {
  document.getElementById("stat").textContent = "graph.json 로드 실패 — http 서버로 열어주세요";
  console.error(e);
});

function counts(arr, key) { const m = {}; arr.forEach(x => { m[x[key]] = (m[x[key]] || 0) + 1; }); return m; }
const nodeIdOf = x => typeof x === "object" && x ? x.id : x;
const edgeKey = (a, b) => [nodeIdOf(a), nodeIdOf(b)].sort().join("::");
function isHierarchyLink(l) {
  const s = byId[nodeIdOf(l.source)], t = byId[nodeIdOf(l.target)];
  return l.rel === "contains" || isHier(s) || isHier(t);
}

function buildHierarchyStats(nodes) {
  const stats = {};
  nodes.filter(n => !isHier(n) && n.hierarchy).forEach(n => {
    const h = n.hierarchy;
    const keys = [
      `galaxy:${h.galaxy}`,
      `cluster:${h.galaxy}/${h.cluster}`,
      `system:${h.galaxy}/${h.cluster}/${h.system}`
    ];
    keys.forEach(k => { stats[k] = (stats[k] || 0) + 1; });
  });
  return stats;
}

function hierarchyKey(n, level) {
  const h = n && n.hierarchy || {};
  if (level === "galaxy") return h.galaxy || "";
  if (level === "cluster") return `${h.galaxy || ""}/${h.cluster || ""}`;
  return `${h.galaxy || ""}/${h.cluster || ""}/${h.system || ""}`;
}

function isAgentDomainCandidate(n) {
  if (!n || hierarchyKey(n, "system") !== "ai-building/ai/agents") return false;
  const id = n.id || "";
  const label = n.label || "";
  return /(^|\/)[^\/]*_persona\.md$/i.test(id)
    || /(^|\/)orchestration\.md$/i.test(id)
    || (n.type === "procedural" && /(시스템 프롬프트|오케스트레이션|persona|agent)/i.test(`${label} ${id}`));
}

function isExpertNetworkCandidate(n) {
  const id = n && n.id || "";
  const label = n && n.label || "";
  return /^20-Areas\//.test(id)
    && /(전문가 AI|시스템 프롬프트|오케스트레이션|_persona\.md|advisory|valuation|tax|accounting|forensic|business)/i.test(`${label} ${id}`);
}

function isNonAiDomainTarget(n) {
  return !!n && hierarchyKey(n, "galaxy") !== "ai-building";
}

function isProjectBridgeCandidate(n) {
  const id = n && n.id || "";
  return /^30-Projects\/brunch\//.test(id)
    || /^30-Projects\/over-series\/concepts\/(?:Overwrite|Override)\.md$/i.test(id)
    || id === "30-Projects/agent-orchestration/agent-orchestration.md";
}

function isProjectNode(n) {
  return /^30-Projects\//.test(String(n?.id || ""));
}

function isOverSeriesNode(n) {
  return /^30-Projects\/over-series\//.test(String(n?.id || ""));
}

function isIndexContainerEdge(l) {
  const s = byId[nodeIdOf(l.source)], t = byId[nodeIdOf(l.target)];
  return isIndexContainerNode(s) || isIndexContainerNode(t);
}

function layoutEdgeWeight(rel) {
  if (rel === "near-miss" || rel === "similar") return .35;
  if (rel === "topic-tag" || rel === "thesis-tag" || rel === "mentions") return .55;
  if (rel === "composes") return .7;
  return 1;
}

function placementEdgeWeight(rel) {
  if (rel === "composes") return 1.2;
  if (rel === "near-miss" || rel === "similar") return .25;
  if (rel === "topic-tag" || rel === "thesis-tag" || rel === "mentions") return .45;
  return 1;
}

function buildLayoutHints(edges) {
  const hints = {};
  const touch = id => hints[id] || (hints[id] = { crossSystem:0, crossCluster:0, crossGalaxy:0, clusterTargets:{}, systemTargets:{}, domainClusterTargets:{}, domainSystemTargets:{}, expertSystemTargets:{}, expertClusterTargets:{}, indexSystemTargets:{}, indexClusterTargets:{}, projectPairSystemTargets:{}, projectPairClusterTargets:{}, projectBridgeSystemTargets:{}, projectBridgeClusterTargets:{} });
  const addAgentDomainTarget = (agent, other, weight) => {
    if (!isAgentDomainCandidate(agent) || !isNonAiDomainTarget(other)) return;
    const h = touch(agent.id);
    const system = hierarchyKey(other, "system");
    const cluster = hierarchyKey(other, "cluster");
    h.domainSystemTargets[system] = (h.domainSystemTargets[system] || 0) + weight;
    h.domainClusterTargets[cluster] = (h.domainClusterTargets[cluster] || 0) + weight;
  };
  const addProjectBridgeTarget = (bridge, other, weight) => {
    if (!isProjectBridgeCandidate(bridge)) return;
    const ownSystem = hierarchyKey(bridge, "system");
    const otherSystem = hierarchyKey(other, "system");
    const otherCluster = hierarchyKey(other, "cluster");
    if (!otherSystem || ownSystem === otherSystem) return;
    const h = touch(bridge.id);
    const boosted = weight * (isProjectBridgeCandidate(other) ? 1.45 : 1);
    h.projectBridgeSystemTargets[otherSystem] = (h.projectBridgeSystemTargets[otherSystem] || 0) + boosted;
    h.projectBridgeClusterTargets[otherCluster] = (h.projectBridgeClusterTargets[otherCluster] || 0) + boosted;
  };
  const addExpertNetworkTarget = (expert, other, rel, weight) => {
    if (!isExpertNetworkCandidate(expert) || !isExpertNetworkCandidate(other)) return;
    const ownSystem = hierarchyKey(expert, "system");
    const otherSystem = hierarchyKey(other, "system");
    const otherCluster = hierarchyKey(other, "cluster");
    if (!otherSystem || ownSystem === otherSystem) return;
    const h = touch(expert.id);
    const relBoost = rel === "requires" ? 1.35 : rel === "instantiates" ? 1.15 : 1;
    const boosted = weight * relBoost;
    h.expertSystemTargets[otherSystem] = (h.expertSystemTargets[otherSystem] || 0) + boosted;
    h.expertClusterTargets[otherCluster] = (h.expertClusterTargets[otherCluster] || 0) + boosted;
  };
  const addIndexContainerTarget = (index, other, rel, weight) => {
    if (!isIndexContainerNode(index) || isIndexContainerNode(other)) return;
    const ownSystem = hierarchyKey(index, "system");
    const otherSystem = hierarchyKey(other, "system");
    const otherCluster = hierarchyKey(other, "cluster");
    if (!otherSystem || ownSystem === otherSystem) return;
    const h = touch(index.id);
    const relBoost = rel === "composes" ? 1.45 : .8;
    const boosted = weight * relBoost;
    h.indexSystemTargets[otherSystem] = (h.indexSystemTargets[otherSystem] || 0) + boosted;
    h.indexClusterTargets[otherCluster] = (h.indexClusterTargets[otherCluster] || 0) + boosted;
  };
  const addProjectPairTarget = (project, other, rel, weight) => {
    if (!isProjectNode(project) || !isProjectNode(other) || isProjectBridgeCandidate(project)) return;
    const ownSystem = hierarchyKey(project, "system");
    const otherSystem = hierarchyKey(other, "system");
    const otherCluster = hierarchyKey(other, "cluster");
    if (!otherSystem || ownSystem === otherSystem) return;
    if (!["requires", "extends", "supports", "instantiates"].includes(rel)) return;
    const h = touch(project.id);
    const relBoost = rel === "requires" ? 1.38 : rel === "instantiates" ? 1.18 : 1;
    const boosted = weight * relBoost;
    h.projectPairSystemTargets[otherSystem] = (h.projectPairSystemTargets[otherSystem] || 0) + boosted;
    h.projectPairClusterTargets[otherCluster] = (h.projectPairClusterTargets[otherCluster] || 0) + boosted;
  };
  edges.forEach(e => {
    if (isHierarchyLink(e)) return;
    const s = byId[nodeIdOf(e.source)], t = byId[nodeIdOf(e.target)];
    if (!isInteractiveNode(s) || !isInteractiveNode(t)) return;
    const w = layoutEdgeWeight(e.rel);
    const pw = placementEdgeWeight(e.rel);
    const sh = touch(s.id);
    const th = touch(t.id);
    addAgentDomainTarget(s, t, pw);
    addAgentDomainTarget(t, s, pw);
    addProjectBridgeTarget(s, t, pw);
    addProjectBridgeTarget(t, s, pw);
    addExpertNetworkTarget(s, t, e.rel, pw);
    addExpertNetworkTarget(t, s, e.rel, pw);
    addIndexContainerTarget(s, t, e.rel, pw);
    addIndexContainerTarget(t, s, e.rel, pw);
    addProjectPairTarget(s, t, e.rel, pw);
    addProjectPairTarget(t, s, e.rel, pw);
    if (hierarchyKey(s, "system") !== hierarchyKey(t, "system")) {
      const ss = hierarchyKey(s, "system");
      const ts = hierarchyKey(t, "system");
      sh.crossSystem += w;
      th.crossSystem += w;
      sh.systemTargets[ts] = (sh.systemTargets[ts] || 0) + pw;
      th.systemTargets[ss] = (th.systemTargets[ss] || 0) + pw;
    }
    if (hierarchyKey(s, "cluster") !== hierarchyKey(t, "cluster")) {
      const sc = hierarchyKey(s, "cluster");
      const tc = hierarchyKey(t, "cluster");
      sh.crossCluster += w;
      th.crossCluster += w;
      sh.clusterTargets[tc] = (sh.clusterTargets[tc] || 0) + pw;
      th.clusterTargets[sc] = (th.clusterTargets[sc] || 0) + pw;
    }
    if (hierarchyKey(s, "galaxy") !== hierarchyKey(t, "galaxy")) {
      sh.crossGalaxy += w;
      th.crossGalaxy += w;
    }
  });
  Object.values(hints).forEach(h => {
    h.bridgeScore = h.crossSystem + h.crossCluster * 1.15 + h.crossGalaxy * 1.45;
    const topCluster = Object.entries(h.clusterTargets).sort((a, b) => b[1] - a[1])[0];
    const topSystem = Object.entries(h.systemTargets).sort((a, b) => b[1] - a[1])[0];
    const topDomainCluster = Object.entries(h.domainClusterTargets).sort((a, b) => b[1] - a[1])[0];
    const topDomainSystem = Object.entries(h.domainSystemTargets).sort((a, b) => b[1] - a[1])[0];
    const topExpertCluster = Object.entries(h.expertClusterTargets).sort((a, b) => b[1] - a[1])[0];
    const topExpertSystem = Object.entries(h.expertSystemTargets).sort((a, b) => b[1] - a[1])[0];
    const topIndexCluster = Object.entries(h.indexClusterTargets).sort((a, b) => b[1] - a[1])[0];
    const topIndexSystem = Object.entries(h.indexSystemTargets).sort((a, b) => b[1] - a[1])[0];
    const topProjectPairCluster = Object.entries(h.projectPairClusterTargets).sort((a, b) => b[1] - a[1])[0];
    const topProjectPairSystem = Object.entries(h.projectPairSystemTargets).sort((a, b) => b[1] - a[1])[0];
    const topProjectBridgeCluster = Object.entries(h.projectBridgeClusterTargets).sort((a, b) => b[1] - a[1])[0];
    const topProjectBridgeSystem = Object.entries(h.projectBridgeSystemTargets).sort((a, b) => b[1] - a[1])[0];
    const clusterTotal = Object.values(h.clusterTargets).reduce((a, b) => a + b, 0);
    const systemTotal = Object.values(h.systemTargets).reduce((a, b) => a + b, 0);
    const domainClusterTotal = Object.values(h.domainClusterTargets).reduce((a, b) => a + b, 0);
    const domainSystemTotal = Object.values(h.domainSystemTargets).reduce((a, b) => a + b, 0);
    const expertClusterTotal = Object.values(h.expertClusterTargets).reduce((a, b) => a + b, 0);
    const expertSystemTotal = Object.values(h.expertSystemTargets).reduce((a, b) => a + b, 0);
    const indexClusterTotal = Object.values(h.indexClusterTargets).reduce((a, b) => a + b, 0);
    const indexSystemTotal = Object.values(h.indexSystemTargets).reduce((a, b) => a + b, 0);
    const projectPairClusterTotal = Object.values(h.projectPairClusterTargets).reduce((a, b) => a + b, 0);
    const projectPairSystemTotal = Object.values(h.projectPairSystemTargets).reduce((a, b) => a + b, 0);
    const projectBridgeClusterTotal = Object.values(h.projectBridgeClusterTargets).reduce((a, b) => a + b, 0);
    const projectBridgeSystemTotal = Object.values(h.projectBridgeSystemTargets).reduce((a, b) => a + b, 0);
    h.dominantCluster = topCluster && topCluster[0] || "";
    h.dominantClusterWeight = topCluster && topCluster[1] || 0;
    h.dominantClusterShare = clusterTotal ? h.dominantClusterWeight / clusterTotal : 0;
    h.dominantSystem = topSystem && topSystem[0] || "";
    h.dominantSystemWeight = topSystem && topSystem[1] || 0;
    h.dominantSystemShare = systemTotal ? h.dominantSystemWeight / systemTotal : 0;
    h.domainCluster = topDomainCluster && topDomainCluster[0] || "";
    h.domainClusterWeight = topDomainCluster && topDomainCluster[1] || 0;
    h.domainClusterShare = domainClusterTotal ? h.domainClusterWeight / domainClusterTotal : 0;
    h.domainSystem = topDomainSystem && topDomainSystem[0] || "";
    h.domainSystemWeight = topDomainSystem && topDomainSystem[1] || 0;
    h.domainSystemShare = domainSystemTotal ? h.domainSystemWeight / domainSystemTotal : 0;
    h.expertCluster = topExpertCluster && topExpertCluster[0] || "";
    h.expertClusterWeight = topExpertCluster && topExpertCluster[1] || 0;
    h.expertClusterShare = expertClusterTotal ? h.expertClusterWeight / expertClusterTotal : 0;
    h.expertSystem = topExpertSystem && topExpertSystem[0] || "";
    h.expertSystemWeight = topExpertSystem && topExpertSystem[1] || 0;
    h.expertSystemShare = expertSystemTotal ? h.expertSystemWeight / expertSystemTotal : 0;
    h.indexCluster = topIndexCluster && topIndexCluster[0] || "";
    h.indexClusterWeight = topIndexCluster && topIndexCluster[1] || 0;
    h.indexClusterShare = indexClusterTotal ? h.indexClusterWeight / indexClusterTotal : 0;
    h.indexSystem = topIndexSystem && topIndexSystem[0] || "";
    h.indexSystemWeight = topIndexSystem && topIndexSystem[1] || 0;
    h.indexSystemShare = indexSystemTotal ? h.indexSystemWeight / indexSystemTotal : 0;
    h.projectPairCluster = topProjectPairCluster && topProjectPairCluster[0] || "";
    h.projectPairClusterWeight = topProjectPairCluster && topProjectPairCluster[1] || 0;
    h.projectPairClusterShare = projectPairClusterTotal ? h.projectPairClusterWeight / projectPairClusterTotal : 0;
    h.projectPairSystem = topProjectPairSystem && topProjectPairSystem[0] || "";
    h.projectPairSystemWeight = topProjectPairSystem && topProjectPairSystem[1] || 0;
    h.projectPairSystemShare = projectPairSystemTotal ? h.projectPairSystemWeight / projectPairSystemTotal : 0;
    h.projectBridgeCluster = topProjectBridgeCluster && topProjectBridgeCluster[0] || "";
    h.projectBridgeClusterWeight = topProjectBridgeCluster && topProjectBridgeCluster[1] || 0;
    h.projectBridgeClusterShare = projectBridgeClusterTotal ? h.projectBridgeClusterWeight / projectBridgeClusterTotal : 0;
    h.projectBridgeSystem = topProjectBridgeSystem && topProjectBridgeSystem[0] || "";
    h.projectBridgeSystemWeight = topProjectBridgeSystem && topProjectBridgeSystem[1] || 0;
    h.projectBridgeSystemShare = projectBridgeSystemTotal ? h.projectBridgeSystemWeight / projectBridgeSystemTotal : 0;
  });
  return hints;
}

function buildClusterPairHints(edges) {
  const pairs = {};
  edges.forEach(e => {
    if (isHierarchyLink(e)) return;
    const s = byId[nodeIdOf(e.source)], t = byId[nodeIdOf(e.target)];
    if (!isInteractiveNode(s) || !isInteractiveNode(t)) return;
    const a = hierarchyKey(s, "cluster");
    const b = hierarchyKey(t, "cluster");
    if (!a || !b || a === b) return;
    const key = [a, b].sort().join("::");
    const p = pairs[key] || (pairs[key] = { a:[a, b].sort()[0], b:[a, b].sort()[1], weight:0, edges:0 });
    p.weight += layoutEdgeWeight(e.rel);
    p.edges += 1;
  });
  return Object.values(pairs)
    .filter(p => p.weight >= 2.2)
    .sort((a, b) => b.weight - a.weight || b.edges - a.edges)
    .slice(0, 42);
}

function applyClusterPairCompression(clusters, pos, opts = {}) {
  const strengthBase = opts.clusterPairCompression || 0;
  if (!strengthBase || !clusterPairHints.length) return;
  const clusterNodes = {};
  clusters.forEach(n => {
    const h = n.hierarchy || {};
    clusterNodes[`${h.galaxy || ""}/${h.cluster || ""}`] = n;
  });
  for (let pass = 0; pass < 2; pass++) {
    const deltas = {};
    const touch = id => deltas[id] || (deltas[id] = { x:0, y:0, z:0 });
    clusterPairHints.forEach(p => {
      const a = clusterNodes[p.a], b = clusterNodes[p.b];
      if (!a || !b) return;
      const dx = (b.fx || 0) - (a.fx || 0);
      const dy = (b.fy || 0) - (a.fy || 0);
      const dz = (b.fz || 0) - (a.fz || 0);
      const d = Math.max(1, Math.sqrt(dx * dx + dy * dy + dz * dz));
      const sameGalaxy = p.a.split("/")[0] === p.b.split("/")[0];
      const pull = Math.min(.06, (.012 + Math.sqrt(p.weight) * .0045) * strengthBase * (sameGalaxy ? 1.12 : .86));
      const ax = dx * pull;
      const ay = dy * pull;
      const az = dz * pull * .55;
      const da = touch(a.id);
      const db = touch(b.id);
      da.x += ax; da.y += ay; da.z += az;
      db.x -= ax; db.y -= ay; db.z -= az;
    });
    clusters.forEach(n => {
      const d = deltas[n.id];
      if (!d) return;
      const mag = Math.max(1, Math.sqrt(d.x * d.x + d.y * d.y + d.z * d.z));
      const scale = Math.min(1, 82 / mag);
      n.fx += d.x * scale;
      n.fy += d.y * scale;
      n.fz += d.z * scale;
      pos[n.id] = { x:n.fx, y:n.fy, z:n.fz };
    });
  }
}

function clamp01(x) {
  return Math.max(0, Math.min(1, x));
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function nodeStarPower(n) {
  if (isIndexContainerNode(n)) return 0;
  const hint = layoutHints[n?.id] || {};
  const degreePower = clamp01(((deg[n?.id] || 0) - 10) / 36);
  const bridgePower = clamp01((hint.bridgeScore || 0) / 26);
  const galaxyPower = clamp01((hint.crossGalaxy || 0) / 12);
  return clamp01(degreePower * .62 + bridgePower * .24 + galaxyPower * .14);
}

function nodeBurstPower(starPower) {
  return clamp01((starPower - .34) / .42);
}

function hierarchyCount(n) {
  const h = n.hierarchy || {};
  const role = hierRole(n);
  if (role === "galaxy") return hierarchyStats[`galaxy:${h.galaxy}`] || 0;
  if (role === "cluster") return hierarchyStats[`cluster:${h.galaxy}/${h.cluster}`] || 0;
  if (role === "system") return hierarchyStats[`system:${h.galaxy}/${h.cluster}/${h.system}`] || 0;
  return 0;
}

function hierarchyLabel(n) {
  const role = hierRole(n);
  const count = hierarchyCount(n);
  const suffix = role === "galaxy" ? "은하" : role === "cluster" ? "성단" : role === "system" ? "궤도" : "";
  return { title: suffix ? `${n.label} ${suffix}` : n.label, sub: count ? `기준서·절 ${count}개` : "" };
}

function nodeGlyph(type) {
  const m = metaOf(type), c = m.color;
  if (m.glyph === "planet") return `<svg class="gl" viewBox="0 0 14 14"><defs><radialGradient id="g-${type}" cx="35%" cy="28%"><stop offset="0" stop-color="#F6F1E8"/><stop offset=".35" stop-color="${c}"/><stop offset="1" stop-color="${c}" stop-opacity=".55"/></radialGradient></defs><circle cx="7" cy="7" r="5" fill="url(#g-${type})"/><path d="M3.4 8.6c2.4 1.7 5.6 1.6 7.9-.1" fill="none" stroke="#030711" stroke-opacity=".58" stroke-width=".9"/></svg>`;
  if (m.glyph === "crystal") return `<svg class="gl" viewBox="0 0 14 14"><path d="M7 1.7 11.8 7 7 12.3 2.2 7Z" fill="${c}" opacity=".9"/><path d="M7 1.7 7 12.3M2.2 7h9.6M7 1.7 4.7 7 7 12.3 9.3 7Z" fill="none" stroke="#FAF6EE" stroke-opacity=".55" stroke-width=".65"/></svg>`;
  if (m.glyph === "mechanism") return `<svg class="gl" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="${CANVAS_BG}" stroke="${c}" stroke-width="1.5"/><circle cx="7" cy="7" r="2.2" fill="${c}"/><path d="M7 .9v2M7 11.1v2M.9 7h2M11.1 7h2M2.7 2.7l1.4 1.4M9.9 9.9l1.4 1.4M11.3 2.7 9.9 4.1M4.1 9.9l-1.4 1.4" stroke="${c}" stroke-width=".8" stroke-linecap="round"/></svg>`;
  if (m.glyph === "comet") return `<svg class="gl" viewBox="0 0 14 14"><path d="M1.3 10.8c2.5-3 5.2-4.5 8.4-4.7" fill="none" stroke="${c}" stroke-width="1.1" stroke-linecap="round" opacity=".55"/><circle cx="9" cy="5.9" r="4.2" fill="${c}"/><circle cx="7.8" cy="4.7" r="1.1" fill="#FAF6EE" opacity=".7"/></svg>`;
  if (m.glyph === "seal") return `<svg class="gl" viewBox="0 0 14 14"><path d="M7 1.6 12 4.5v5L7 12.4 2 9.5v-5Z" fill="${c}" opacity=".88"/><path d="M7 3.4 10.4 5.3v3.4L7 10.6 3.6 8.7V5.3Z" fill="none" stroke="#F6F1E8" stroke-opacity=".55" stroke-width=".75"/><circle cx="7" cy="7" r="1.35" fill="#030711" opacity=".54"/></svg>`;
  if (m.glyph === "orbit") return `<svg class="gl" viewBox="0 0 14 14"><ellipse cx="7" cy="7" rx="6" ry="3.2" fill="none" stroke="${c}" stroke-width=".85" opacity=".8" transform="rotate(-18 7 7)"/><ellipse cx="7" cy="7" rx="5.2" ry="2.7" fill="none" stroke="${c}" stroke-width=".65" opacity=".45" transform="rotate(38 7 7)"/><circle cx="7" cy="7" r="2.9" fill="${c}"/><circle cx="11.4" cy="5.4" r=".9" fill="#FAF6EE"/></svg>`;
  return `<svg class="gl" viewBox="0 0 14 14"><path d="M7 1.9c3 0 5.1 1.9 5.1 4.8 0 3.3-2.2 5.4-5.3 5.4-3.2 0-5-2.1-4.9-5.1.1-3 2-5.1 5.1-5.1Z" fill="${c}" opacity=".85"/><path d="M4.4 6.2h5.3M5.1 8.5h3.4" stroke="#FAF6EE" stroke-opacity=".42" stroke-width=".75" stroke-linecap="round"/></svg>`;
}

function buildLegends(g) {
  const nc = counts(g.nodes.filter(n => !isHier(n)), "type");
  const rc = counts(g.edges.filter(e => !isHierarchyLink(e)), "rel");
  document.getElementById("leg-nodes").innerHTML = Object.keys(nc).sort((a, b) => nc[b] - nc[a]).map(t => {
    const m = metaOf(t);
    return `<div class="leg" data-nt="${t}">${nodeGlyph(t)}<span class="ko">${m.ko}</span><span class="en">${t}</span><span class="ct">${nc[t]}</span></div>`;
  }).join("");
  document.getElementById("leg-edges").innerHTML = Object.keys(rc).sort((a, b) => rc[b] - rc[a]).map(r => {
    const m = relOf(r);
    const gl = `<svg class="gl" viewBox="0 0 14 14"><line x1="1" y1="7" x2="13" y2="7" stroke="${m.color}" stroke-width="2" ${m.dir ? "" : 'stroke-dasharray="2 2"'}/></svg>`;
    return `<div class="leg" data-er="${r}">${gl}<span class="ko">${m.ko}</span><span class="en">${r}</span><span class="ct">${rc[r]}</span></div>`;
  }).join("");
  document.querySelectorAll("[data-nt]").forEach(el => el.onclick = () => toggleNodeTypeHighlight(el.dataset.nt, el));
  document.querySelectorAll("[data-er]").forEach(el => el.onclick = () => toggleRelHighlight(el.dataset.er, el));
  const realNodes = Object.values(nc).reduce((a, b) => a + b, 0);
  const visibleLinks = Object.values(rc).reduce((a, b) => a + b, 0);
  document.getElementById("stat").textContent = `기준서·절 ${realNodes} · 연결 ${visibleLinks}`;
}

function buildFocusControls(g) {
  const galaxies = g.nodes.filter(n => hierRole(n) === "galaxy").sort((a, b) => (a.label || "").localeCompare(b.label || "", "ko"));
  const box = document.getElementById("focus-list");
  if (!box) return;
  box.innerHTML = galaxies.map(n => {
    const c = HIER_COLOR.galaxy;
    const count = hierarchyCount(n);
    const label = count ? `${n.label} · ${count}` : n.label;
    return `<button class="focus-pill" data-focus="${n.id.replace(/"/g, "&quot;")}"><span class="dot" style="background:${c}"></span><span>${label}</span></button>`;
  }).join("");
  box.querySelectorAll("[data-focus]").forEach(el => el.addEventListener("click", () => selectHierarchyRegion(el.dataset.focus)));
}

function toggleNodeTypeHighlight(key, el) {
  if (highlightedNodeTypes.has(key)) {
    highlightedNodeTypes.delete(key);
    el.classList.remove("on");
  } else {
    highlightedNodeTypes.add(key);
    el.classList.add("on");
  }
  refreshActivationStyles();
}

function toggleRelHighlight(key, el) {
  if (highlightedRels.has(key)) {
    highlightedRels.delete(key);
    el.classList.remove("on");
  } else {
    highlightedRels.add(key);
    el.classList.add("on");
  }
  refreshActivationStyles();
}

function isRelHighlightedEdge(l) {
  return highlightedRels.size > 0 && highlightedRels.has(l.rel);
}

function isTypeHighlightedNode(id) {
  const n = byId[nodeIdOf(id)];
  return highlightedNodeTypes.size > 0 && highlightedNodeTypes.has(n?.type);
}

function isTypeHighlightedEdge(l) {
  if (!highlightedNodeTypes.size) return false;
  const s = byId[nodeIdOf(l.source)], t = byId[nodeIdOf(l.target)];
  return highlightedNodeTypes.has(s?.type) || highlightedNodeTypes.has(t?.type);
}

function finiteCoord(n, key, fallback = 0) {
  const v = Number.isFinite(n?.[key]) ? n[key] : n?.[`f${key}`];
  return Number.isFinite(v) ? v : fallback;
}

function nodeWorldPosition(n) {
  return new THREE.Vector3(finiteCoord(n, "x"), finiteCoord(n, "y"), finiteCoord(n, "z"));
}

function depthCueForPoint(point) {
  if (!threeState?.camera) return { t:.5, scale:1, opacity:1, glow:1 };
  const d = threeState.camera.position.distanceTo(point);
  const t = THREE.MathUtils.clamp((d - 700) / 4300, 0, 1);
  return {
    t,
    scale:THREE.MathUtils.lerp(1.08, .62, t),
    opacity:THREE.MathUtils.lerp(1, .32, t),
    glow:THREE.MathUtils.lerp(1.2, .45, t)
  };
}

function nodeDepthCue(n) {
  const cue = depthCueForPoint(nodeWorldPosition(n));
  if (!isIndexContainerNode(n)) return cue;
  return { ...cue, scale:cue.scale * .78, opacity:cue.opacity * .58, glow:cue.glow * .42 };
}

function edgeDepthCue(s, t) {
  const p = nodeWorldPosition(s).add(nodeWorldPosition(t)).multiplyScalar(.5);
  return depthCueForPoint(p);
}

function isFocusedDirectNeighbor(id) {
  return !!focusedNodeId && id !== focusedNodeId && activatedNodeIds.has(id);
}

function graphRefreshNodes() {
  if (!Graph) return;
  if (graphMode3D && Graph.nodeThreeObject) Graph.nodeThreeObject(createThreeNode);
  else if (Graph.nodeRelSize) Graph.nodeRelSize(REL);
}

function setNodeHoverVisual(id, on) {

  const obj = threeState.nodeObjects.get(id);
  if (obj) obj.userData.hovered = !!on;
  updateNodePointStyles();
}

function refreshActivationStyles() {
  if (graphMode3D) refreshThreeStyles();
  else graphRefreshNodes();
}

function forceCharge(strength) {
  if (!Graph || !Graph.d3Force) return;
  const f = Graph.d3Force("charge");
  if (f && f.strength) f.strength(strength);
}

function supportsWebGL() {
  try {
    if (new URLSearchParams(window.location.search).get("force2d") === "1") return false;
    const canvas = document.createElement("canvas");
    return !!(window.WebGLRenderingContext && (canvas.getContext("webgl") || canvas.getContext("experimental-webgl")));
  } catch {
    return false;
  }
}

function findClickable(obj, clickable) {
  let cur = obj;
  while (cur) {
    if (clickable.has(cur)) return clickable.get(cur);
    cur = cur.parent;
  }
  return null;
}

function pickNodeAt(ev) {
  return pickNodeAtPoint(ev.clientX, ev.clientY);
}

function pickNodeAtPoint(clientX, clientY) {
  if (!threeState) return null;
  const { renderer, camera, raycaster, pointer, clickable } = threeState;
  const box = renderer.domElement.getBoundingClientRect();
  pointer.x = ((clientX - box.left) / box.width) * 2 - 1;
  pointer.y = -((clientY - box.top) / box.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  if (threeState.nodePoints) {
    raycaster.params.Points.threshold = Math.max(5, (threeState.graphRadius || 1) * .012);
    const pointHit = raycaster.intersectObject(threeState.nodePoints, false)[0];
    if (pointHit && Number.isInteger(pointHit.index)) return threeState.nodeRecords[pointHit.index]?.node || null;
  }
  const hits = raycaster.intersectObjects([...clickable.keys()], true);
  return hits.map(h => findClickable(h.object, clickable)).find(Boolean) || null;
}

function setHoverNode(id) {
  const next = id || null;
  if (hoveredNodeId === next) return;
  const prev = hoveredNodeId;
  hoveredNodeId = next;
  setNodeHoverVisual(prev, false);
  setNodeHoverVisual(next, true);
  if (threeState?.renderer?.domElement) threeState.renderer.domElement.style.cursor = next ? "pointer" : "";
  if (!focusedNodeId && next) {
    const n = byId[next];
    const focus = document.getElementById("hud-focus");
    const note = document.getElementById("hud-note");
    if (focus && n) focus.textContent = n.label || n.id;

  } else if (!focusedNodeId) {
    focusedLabel = "K-IFRS 기준서 우주";
    activationLabel = "";
    updateHud();
  }
}

function rotateUniverseBy(dx, dy) {
  if (!threeState?.rotationVelocity) return;
  const v = threeState.rotationVelocity;
  v.y = THREE.MathUtils.clamp(v.y + dx * 0.00034, -0.042, 0.042);
  v.x = THREE.MathUtils.clamp(v.x + dy * 0.00026, -0.032, 0.032);
}

function updateCameraSpinFromDrag(dx, dy) {
  const spin = threeState?.cameraSpin;
  if (!spin) return;
  spin.ty = THREE.MathUtils.clamp(dx * 0.0021, -0.036, 0.036);
  spin.tx = THREE.MathUtils.clamp(dy * 0.00185, -0.03, 0.03);
  spin.last = performance.now();
}

function applyCameraSpin(now) {
  if (!threeState?.cameraSpin || !threeState?.camera || !threeState?.controls) return;
  const spin = threeState.cameraSpin;
  const dt = THREE.MathUtils.clamp((now - (spin.lastFrame || now)) / 16.67, .5, 2.4);
  spin.lastFrame = now;
  if (!spin.dragging) {
    const releaseDecay = Math.pow(.982, dt);
    spin.tx *= releaseDecay;
    spin.ty *= releaseDecay;
  }
  const blend = spin.dragging ? .22 : .045;
  spin.vx = THREE.MathUtils.lerp(spin.vx, spin.tx, 1 - Math.pow(1 - blend, dt));
  spin.vy = THREE.MathUtils.lerp(spin.vy, spin.ty, 1 - Math.pow(1 - blend, dt));
  if (!spin.dragging) {
    const glideDecay = Math.pow(.996, dt);
    spin.vx *= glideDecay;
    spin.vy *= glideDecay;
  }
  if (Math.abs(spin.vx) < 0.00001) spin.vx = 0;
  if (Math.abs(spin.vy) < 0.00001) spin.vy = 0;
  if (Math.abs(spin.tx) < 0.00001) spin.tx = 0;
  if (Math.abs(spin.ty) < 0.00001) spin.ty = 0;
  if (!spin.vx && !spin.vy) return;
  const { camera, controls } = threeState;
  const target = controls.target;
  const offset = camera.position.clone().sub(target);
  const screenUp = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion).normalize();
  const screenRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion).normalize();
  const yaw = new THREE.Quaternion().setFromAxisAngle(screenUp, -spin.vy * dt);
  const pitch = new THREE.Quaternion().setFromAxisAngle(screenRight, -spin.vx * dt);
  const q = yaw.multiply(pitch);
  offset.applyQuaternion(q);
  camera.up.applyQuaternion(q).normalize();
  camera.position.copy(target).add(offset);
  camera.lookAt(target);
}

function createThreeGraphAdapter() {
  const adapter = {
    graphData(data) { threeState.currentData = data; renderGraph3D(data); return adapter; },
    currentData() { return threeState.currentData; },
    d3Force() { return { strength() { return adapter; } }; },
    d3ReheatSimulation() { renderGraph3D(threeState.currentData); return adapter; },
    onEngineStop(cb) { setTimeout(cb, 120); return adapter; },
    zoomToFit(ms = 500, padding = 120) { fitCamera3D(ms, padding); return adapter; },
    cameraPosition(pos, lookAt, ms = 900) { moveCamera3D(pos, lookAt, ms); return adapter; },
    nodeThreeObject() { renderGraph3D(threeState.currentData); return adapter; },
    nodeRelSize() { renderGraph3D(threeState.currentData); return adapter; }
  };
  return adapter;
}

function animateGalaxyScene(now) {
  if (!threeState?.graphGroup) return;
  const t = now * 0.001;
  const group = threeState.graphGroup;
  const r = threeState.userRotation || { x:0, y:0, z:0 };
  const v = threeState.rotationVelocity || { x:0, y:0, z:0 };
  threeState.idleDriftBlend = THREE.MathUtils.lerp(threeState.idleDriftBlend ?? 1, 1, .018);
  const idleDrift = threeState.idleDriftBlend;
  r.y += 0.00042 * idleDrift + v.y;
  r.x = wrapAngle(r.x + v.x);
  r.y = wrapAngle(r.y);
  r.z += 0.00008 * idleDrift + v.z;
  v.x *= .935;
  v.y *= .935;
  v.z *= .94;
  if (Math.abs(v.x) < 0.00001) v.x = 0;
  if (Math.abs(v.y) < 0.00001) v.y = 0;
  if (Math.abs(v.z) < 0.00001) v.z = 0;
  const drift = idleDrift;
  group.rotation.x = r.x + Math.sin(t * 0.037) * 0.005 * drift;
  group.rotation.y = r.y + Math.sin(t * 0.043) * 0.008 * drift;
  group.rotation.z = r.z + Math.sin(t * 0.055) * 0.012 * drift;
  group.traverse(obj => {
    const u = obj.userData || {};
    if (u.kind === "orbit") obj.rotation.z += u.speed || 0.0012;
    else if (u.kind === "glow" && obj.material) {
      obj.material.opacity = u.baseOpacity + Math.sin(t * u.speed + u.phase) * u.amp;
    } else if (u.kind === "label" && obj.material) {
      const pos = new THREE.Vector3();
      obj.getWorldPosition(pos);
      const d = threeState.camera.position.distanceTo(pos);
      const fade = THREE.MathUtils.clamp((u.fadeEnd - d) / Math.max(1, u.fadeEnd - u.fadeStart), u.minOpacity, u.maxOpacity);
      obj.material.opacity = u.forceVisible ? Math.max(fade, .62) : fade;
    } else if (u.kind === "nodeGroup") {
      const pulse = u.role === "star" ? Math.sin(t * u.speed + u.phase) * (u.active ? 0.075 : 0.035) : 0;
      const s = (u.baseScale || 1) * (1 + pulse) * (u.hovered ? 1.08 : 1) * (u.active ? 1.12 : 1);
      obj.scale.setScalar(s);
    }
  });
}

function updateGraphLabels() {
  if (!threeState?.labelLayer || !threeState?.camera) return;
  const { labelLayer, nodeObjects, camera, renderer, graphGroup } = threeState;
  camera.updateMatrixWorld(true);
  graphGroup?.updateMatrixWorld(true);
  const wanted = new Set();
  const placed = [];
  const rect = renderer.domElement.getBoundingClientRect();
  DATA?.nodes?.forEach(n => {
    if (!showLabels || !isInteractiveNode(n)) return;
    const selected = focusedNodeId === n.id;
    const hovered = hoveredNodeId === n.id;
    const neighbor = isFocusedDirectNeighbor(n.id);
    const active = selected || hovered || neighbor;
    if (focusedNodeId && !active) return;
    if (!focusedNodeId && !active && !isMajorNode(n)) return;
    const obj = nodeObjects.get(n.id);
    if (!obj) return;
    const pos = new THREE.Vector3();
    obj.getWorldPosition(pos);
    const projected = pos.clone().project(camera);
    if (projected.z < -1 || projected.z > 1) return;
    const x = (projected.x + 1) * rect.width / 2;
    const y = (-projected.y + 1) * rect.height / 2;
    if (x < -180 || x > rect.width + 240 || y < -40 || y > rect.height + 40) return;
    const labelText = n.short_ko_title || n.label || n.id;
    const labelWidth = Math.min(window.innerWidth <= 760 ? 180 : 260, Math.max(72, String(labelText).length * 6.4));
    const labelBox = { left:x + 10, right:x + 10 + labelWidth, top:y - 10, bottom:y + 10 };
    const overlaps = placed.some(box => !(labelBox.right + 8 < box.left || labelBox.left > box.right + 8 || labelBox.bottom + 6 < box.top || labelBox.top > box.bottom + 6));
    if (!active && overlaps) return;
    placed.push(labelBox);
    wanted.add(n.id);
    let el = threeState.labelEls.get(n.id);
    if (!el) {
      el = document.createElement("div");
      el.className = "node-label";
      el.textContent = labelText;
      labelLayer.appendChild(el);
      threeState.labelEls.set(n.id, el);
    }
    const cue = depthCueForPoint(pos);
    el.classList.toggle("active", selected || hovered);
    el.classList.toggle("neighbor", neighbor);
    el.style.opacity = selected || hovered ? ".98" : neighbor ? `${Math.max(.72, .86 * cue.opacity)}` : `${Math.max(.74, .9 * cue.opacity)}`;
    el.style.transform = `translate3d(${(x + 10).toFixed(2)}px, ${(y - 7).toFixed(2)}px, 0)`;
  });
  threeState.labelEls.forEach((el, id) => {
    if (!wanted.has(id)) {
      el.remove();
      threeState.labelEls.delete(id);
    }
  });
}

function renderGraph3D(data) {
  if (!threeState || !data) return;
  const { graphGroup, clickable } = threeState;
  graphGroup.traverse(obj => {
    obj.geometry?.dispose?.();
    if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose?.());
    else obj.material?.dispose?.();
  });
  graphGroup.clear();
  clickable.clear();
  threeState.nodeObjects = new Map();
  threeState.nodeRecords = [];
  threeState.nodeRecordById = new Map();
  threeState.edgeRecords = [];
  threeState.nodePoints = null;
  threeState.edgeSegments = null;
  const realNodes = data.nodes.filter(n => isInteractiveNode(n));
  const center = new THREE.Vector3();
  if (realNodes.length) {
    realNodes.forEach(n => center.add(nodeWorldPosition(n)));
    center.multiplyScalar(1 / realNodes.length);
  }
  threeState.graphCenter.copy(center);
  graphGroup.position.copy(center);

  const radii = realNodes.map(n => nodeWorldPosition(n).distanceTo(center)).sort((a, b) => a - b);
  threeState.graphRadius = Math.max(120, radii[Math.min(radii.length - 1, Math.floor(radii.length * .85))] || 1);
  threeState.controls.minDistance = threeState.graphRadius * 1.05;
  threeState.controls.maxDistance = threeState.graphRadius * 4;
  threeState.motionScale = threeState.graphRadius * .006;
  buildNodePointField(realNodes, center);
  buildEdgeLineField(data.links, center);
  updateNodePointStyles();
  updateEdgeFieldStyles();
  threeState.host.dataset.nodeDrawObjects = threeState.nodePoints ? "1" : "0";
  threeState.host.dataset.edgeDrawObjects = threeState.edgeSegments ? "1" : "0";
  threeState.host.dataset.nodeCount = String(threeState.nodeRecords.length);
  threeState.host.dataset.edgeCount = String(threeState.edgeRecords.length);
  threeState.host.dataset.graphRadius = threeState.graphRadius.toFixed(2);
  threeState.host.dataset.cameraMinDistance = threeState.controls.minDistance.toFixed(2);
  threeState.host.dataset.cameraMaxDistance = threeState.controls.maxDistance.toFixed(2);
  threeState.host.dataset.pointSizeMax = "14";
  threeState.host.dataset.pointScaleModel = "max-zoom-distance";
  threeState.host.dataset.pointMinDistanceRatio = "1.05";
  threeState.host.dataset.wheelZoomSpeed = "0.42";
  threeState.host.dataset.focusNodeAlpha = "0";
  threeState.host.dataset.focusEdgeIntensity = "0.34";
  threeState.host.dataset.focusSelectedNodeAlpha = "0.82";
  threeState.host.dataset.focusSelectedNodeBoost = "1.22";
  threeState.host.dataset.focusSelectedWhiteMix = "0.26";
  threeState.host.dataset.focusNeighborNodeAlpha = "0.96";
  threeState.host.dataset.focusNeighborNodeBoost = "1.42";
  threeState.host.dataset.focusNeighborWhiteMix = "0.10";
  threeState.host.dataset.focusActiveEdgeIntensity = "1.08";
  threeState.host.dataset.focusTransitionMs = "240";
  threeState.host.dataset.dragSpinGain = "1.7";
  threeState.host.dataset.selectionCamera = "locked";
  threeState.host.dataset.spineCount = String(realNodes.filter(n => Number.isInteger(n.__spineRank)).length);
  threeState.host.dataset.spineEdgeCount = String(threeState.edgeRecords.filter(record =>
    Number.isInteger(record.source.node.__spineRank) || Number.isInteger(record.target.node.__spineRank)
  ).length);
}

function buildNodePointField(nodes, center) {
  const count = nodes.length;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  const seeds = new Float32Array(count);
  const boosts = new Float32Array(count);
  const alphas = new Float32Array(count);
  const whiteMixes = new Float32Array(count);
  nodes.forEach((n, i) => {
    const base = nodeWorldPosition(n).sub(center);
    const color = threeColor(colorOf(n.type));
    const seed = hash01(n.id) * Math.PI * 2;
    positions.set([base.x, base.y, base.z], i * 3);
    colors.set([color.r, color.g, color.b], i * 3);
    const role = hierRole(n);
    sizes[i] = role === "galaxy" ? 12.7 : role === "cluster" ? 11.8 : role === "system" ? 10.8
      : 8.2 + radius(n) * 1.4 + nodeStarPower(n);
    seeds[i] = seed;
    boosts[i] = 1;
    alphas[i] = 1;
    whiteMixes[i] = .62;
    const anchor = new THREE.Object3D();
    anchor.position.copy(base);
    anchor.userData = { kind:"nodeAnchor", id:n.id, hovered:false };
    graphGroupAddAnchor(anchor);
    const record = {
      node:n, index:i, anchor, base, current:base.clone(), currentBoost:1, currentAlpha:1, currentWhiteMix:.62,
      targetBoost:1, targetAlpha:1, targetWhiteMix:.62,
      seedX:seed, seedY:seed * 1.37 + 1.1, seedZ:seed * .73 + 2.4,
      amp:.35 + hash01(`${n.id}:drift`) * .65
    };
    threeState.nodeRecords.push(record);
    threeState.nodeRecordById.set(n.id, record);
    threeState.nodeObjects.set(n.id, anchor);
  });
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3).setUsage(THREE.DynamicDrawUsage));
  geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
  geometry.setAttribute("aSize", new THREE.BufferAttribute(sizes, 1));
  geometry.setAttribute("aSeed", new THREE.BufferAttribute(seeds, 1));
  geometry.setAttribute("aBoost", new THREE.BufferAttribute(boosts, 1).setUsage(THREE.DynamicDrawUsage));
  geometry.setAttribute("aAlpha", new THREE.BufferAttribute(alphas, 1).setUsage(THREE.DynamicDrawUsage));
  geometry.setAttribute("aWhiteMix", new THREE.BufferAttribute(whiteMixes, 1).setUsage(THREE.DynamicDrawUsage));
  const material = new THREE.ShaderMaterial({
    uniforms:{
      uTime:{ value:0 },
      uNear:{ value:threeState.graphRadius * .62 },
      uFar:{ value:threeState.graphRadius * 3.6 },
      uMotion:{ value:prefersReducedMotion() ? 0 : 1 },
      uMinDistance:{ value:threeState.controls.minDistance },
      uCameraDistance:{ value:threeState.camera.position.distanceTo(threeState.controls.target) }
    },
    vertexColors:true,
    transparent:true,
    depthWrite:false,
    blending:THREE.AdditiveBlending,
    vertexShader:`
      attribute float aSize;
      attribute float aSeed;
      attribute float aBoost;
      attribute float aAlpha;
      attribute float aWhiteMix;
      uniform float uTime;
      uniform float uNear;
      uniform float uFar;
      uniform float uMotion;
      uniform float uMinDistance;
      uniform float uCameraDistance;
      varying vec3 vColor;
      varying float vAlpha;
      varying float vBoost;
      varying float vWhiteMix;
      void main() {
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        float breath = 1.0 + 0.10 * uMotion * sin(uTime * 0.82 + aSeed);
        float zoomScale = clamp(uMinDistance / max(uMinDistance, uCameraDistance), 0.28, 1.0);
        float emphasisScale = min(mix(1.0, 1.18, smoothstep(1.24, 1.40, aBoost)), 1.0 / max(zoomScale, 0.001));
        gl_PointSize = clamp(aSize * breath * zoomScale * emphasisScale, 1.4, 14.0);
        gl_Position = projectionMatrix * mv;
        vColor = color;
        vBoost = aBoost;
        vWhiteMix = aWhiteMix;
        vAlpha = aAlpha * (1.0 - smoothstep(uNear, uFar, -mv.z));
      }
    `,
    fragmentShader:`
      varying vec3 vColor;
      varying float vAlpha;
      varying float vBoost;
      varying float vWhiteMix;
      void main() {
        float d = length(gl_PointCoord - vec2(0.5)) * 2.0;
        if (d > 1.0) discard;
        float core = smoothstep(0.52, 0.0, d);
        float colorFocus = 1.0 - smoothstep(0.10, 0.62, vWhiteMix);
        float halo = smoothstep(1.0, 0.22, d) * mix(0.42, 0.68, colorFocus);
        float alpha = (core + halo) * vAlpha * min(vBoost, 1.85);
        vec3 coreColor = mix(vColor, vec3(1.0), core * vWhiteMix);
        gl_FragColor = vec4(coreColor * mix(0.9, 1.28, core) * vBoost, alpha);
      }
    `
  });
  const points = new THREE.Points(geometry, material);
  points.frustumCulled = false;
  points.userData.kind = "luminousNodeField";
  threeState.nodePoints = points;
  threeState.graphGroup.add(points);
}

function graphGroupAddAnchor(anchor) {
  threeState.graphGroup.add(anchor);
}

function buildEdgeLineField(links, center) {
  const visible = links.filter(l => linkVisibility(l) && threeState.nodeRecordById.has(nodeIdOf(l.source)) && threeState.nodeRecordById.has(nodeIdOf(l.target)));
  const positions = new Float32Array(visible.length * 6);
  const colors = new Float32Array(visible.length * 6);
  const intensities = new Float32Array(visible.length * 2);
  const seeds = new Float32Array(visible.length * 2);
  visible.forEach((l, i) => {
    const source = threeState.nodeRecordById.get(nodeIdOf(l.source));
    const target = threeState.nodeRecordById.get(nodeIdOf(l.target));
    const neutralColor = threeColor(EDGE_NEUTRAL);
    const sourceNodeColor = threeColor(colorOf(source.node.type));
    const targetNodeColor = threeColor(colorOf(target.node.type));
    const sourceColor = neutralColor.clone().lerp(sourceNodeColor, .22);
    const targetColor = neutralColor.clone().lerp(targetNodeColor, .22);
    positions.set([source.current.x, source.current.y, source.current.z, target.current.x, target.current.y, target.current.z], i * 6);
    colors.set([sourceColor.r, sourceColor.g, sourceColor.b, targetColor.r, targetColor.g, targetColor.b], i * 6);
    const seed = hash01(`${nodeIdOf(l.source)}:${nodeIdOf(l.target)}:${l.rel}`) * Math.PI * 2;
    seeds.set([seed, seed], i * 2);
    threeState.edgeRecords.push({ link:l, index:i, source, target, sourceNodeColor, targetNodeColor, currentIntensity:.3, targetIntensity:.3 });
  });
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3).setUsage(THREE.DynamicDrawUsage));
  geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
  geometry.setAttribute("aIntensity", new THREE.BufferAttribute(intensities, 1).setUsage(THREE.DynamicDrawUsage));
  geometry.setAttribute("aSeed", new THREE.BufferAttribute(seeds, 1));
  const material = new THREE.ShaderMaterial({
    uniforms:{ uTime:{ value:0 }, uOpacity:{ value:.24 }, uMotion:{ value:prefersReducedMotion() ? 0 : 1 } },
    vertexColors:true,
    transparent:true,
    depthWrite:false,
    blending:THREE.AdditiveBlending,
    vertexShader:`
      attribute float aIntensity;
      attribute float aSeed;
      varying vec3 vColor;
      varying float vIntensity;
      varying float vSeed;
      void main() {
        vColor = color;
        vIntensity = aIntensity;
        vSeed = aSeed;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader:`
      uniform float uTime;
      uniform float uOpacity;
      uniform float uMotion;
      varying vec3 vColor;
      varying float vIntensity;
      varying float vSeed;
      void main() {
        float pulse = 1.0 + uMotion * 0.18 * sin(uTime * 0.72 + vSeed);
        gl_FragColor = vec4(vColor * vIntensity * pulse, uOpacity * vIntensity * pulse);
      }
    `
  });
  const segments = new THREE.LineSegments(geometry, material);
  segments.frustumCulled = false;
  segments.userData.kind = "luminousEdgeField";
  threeState.edgeSegments = segments;
  threeState.graphGroup.add(segments);
}

function edgeFieldIntensity(l) {
  const active = activatedEdgeKeys.has(edgeKey(l.source, l.target));
  const typeActive = isTypeHighlightedEdge(l);
  const source = byId[nodeIdOf(l.source)];
  const target = byId[nodeIdOf(l.target)];
  const spineEdge = Number.isInteger(source?.__spineRank) || Number.isInteger(target?.__spineRank);
  if (focusedNodeId && !active) return .34;
  if (active) return focusedNodeId ? 1.08 : 1.3;
  if (isRelHighlightedEdge(l)) return 1.3;
  if (typeActive) return 1.2;
  if (highlightedRels.size || highlightedNodeTypes.size) return .06;
  if (layout === "overview") return spineEdge ? .88 : importantEdge(l) ? .5 : .11;
  if (l.rel === "contains") return structureLayout() ? .3 : .46;
  if (l.rel === "near-miss" || l.rel === "similar") return structureLayout() ? .28 : .48;
  return structureLayout() ? .42 : .64;
}

function edgeUsesRelationColor(l) {
  return activatedEdgeKeys.has(edgeKey(l.source, l.target)) || isRelHighlightedEdge(l) || isTypeHighlightedEdge(l);
}

function updateEdgeFieldStyles() {
  const attr = threeState?.edgeSegments?.geometry?.getAttribute("aIntensity");
  const colorAttr = threeState?.edgeSegments?.geometry?.getAttribute("color");
  if (!attr || !colorAttr) return;
  threeState.edgeRecords.forEach(record => {
    const intensity = edgeFieldIntensity(record.link);
    record.targetIntensity = intensity;
    const relationMode = edgeUsesRelationColor(record.link);
    const base = threeColor(relationMode ? relOf(record.link.rel).color : EDGE_NEUTRAL);
    const mix = relationMode ? .12 : .22;
    const sourceColor = base.clone().lerp(record.sourceNodeColor, mix);
    const targetColor = base.clone().lerp(record.targetNodeColor, mix);
    colorAttr.setXYZ(record.index * 2, sourceColor.r, sourceColor.g, sourceColor.b);
    colorAttr.setXYZ(record.index * 2 + 1, targetColor.r, targetColor.g, targetColor.b);
  });
  colorAttr.needsUpdate = true;
  if (threeState?.host) threeState.host.dataset.edgePalette = focusedNodeId || highlightedRels.size || highlightedNodeTypes.size ? "relation" : "neutral";
}

function updateNodePointStyles() {
  const geometry = threeState?.nodePoints?.geometry;
  const boostAttr = geometry?.getAttribute("aBoost");
  const alphaAttr = geometry?.getAttribute("aAlpha");
  const whiteMixAttr = geometry?.getAttribute("aWhiteMix");
  if (!boostAttr || !alphaAttr || !whiteMixAttr) return;
  threeState.nodeRecords.forEach(record => {
    const n = record.node;
    const selected = focusedNodeId === n.id;
    const neighbor = isFocusedDirectNeighbor(n.id);
    const hovered = hoveredNodeId === n.id || record.anchor.userData.hovered;
    const typeActive = isTypeHighlightedNode(n.id);
    const dimmedByType = highlightedNodeTypes.size && !typeActive;
    let boost = 1 + nodeStarPower(n) * .22;
    let alpha = isIndexContainerNode(n) ? .42 : .88;
    let whiteMix = .62;
    if (focusedNodeId) {
      if (selected) { boost = 1.22; alpha = .82; whiteMix = .26; }
      else if (neighbor) { boost = 1.42; alpha = .96; whiteMix = .1; }
      else { boost = 1; alpha = 0; whiteMix = .1; }
    } else {
      if (dimmedByType) alpha = Math.min(alpha, .14);
      if (typeActive) { boost = Math.max(boost, 1.28); alpha = Math.max(alpha, .82); whiteMix = .38; }
      if (hovered) { boost = 1.72; alpha = 1; whiteMix = .28; }
    }
    record.targetBoost = boost;
    record.targetAlpha = alpha;
    record.targetWhiteMix = whiteMix;
  });
}

function updateLuminousField(now) {
  if (!threeState?.nodePoints) return;
  const seconds = now * .001;
  const reduced = prefersReducedMotion();
  const nodeMaterial = threeState.nodePoints.material;
  const edgeMaterial = threeState.edgeSegments?.material;
  const frameMs = THREE.MathUtils.clamp(now - (threeState.lastStyleFrame || now), 0, 50);
  threeState.lastStyleFrame = now;
  const styleBlend = reduced ? 1 : 1 - Math.exp(-frameMs / 86);
  nodeMaterial.uniforms.uTime.value = seconds;
  nodeMaterial.uniforms.uMotion.value = reduced ? 0 : 1;
  nodeMaterial.uniforms.uMinDistance.value = threeState.controls.minDistance;
  nodeMaterial.uniforms.uCameraDistance.value = threeState.camera.position.distanceTo(threeState.controls.target);
  if (edgeMaterial?.uniforms) {
    edgeMaterial.uniforms.uTime.value = seconds;
    edgeMaterial.uniforms.uMotion.value = reduced ? 0 : 1;
  }
  const bloomTarget = threeState.bloomTarget;
  if (bloomTarget && threeState.bloomPass) {
    threeState.bloomPass.strength = THREE.MathUtils.lerp(threeState.bloomPass.strength, bloomTarget.strength, styleBlend);
    threeState.bloomPass.radius = THREE.MathUtils.lerp(threeState.bloomPass.radius, bloomTarget.radius, styleBlend);
    threeState.bloomPass.threshold = THREE.MathUtils.lerp(threeState.bloomPass.threshold, bloomTarget.threshold, styleBlend);
  }
  if (!reduced && now - threeState.lastPulseAt > 900 && threeState.nodeRecords.length) {
    threeState.lastPulseAt = now;
    let best = threeState.nodeRecords[0];
    let bestScore = -1;
    const epoch = Math.floor(now / 900);
    threeState.nodeRecords.forEach(record => {
      const score = hash01(`${record.node.id}:${epoch}`) * (1 + Math.sqrt(deg[record.node.id] || 0));
      if (score > bestScore) { best = record; bestScore = score; }
    });
    threeState.pulseNodeId = best?.node.id || null;
  }
  const positionAttr = threeState.nodePoints.geometry.getAttribute("position");
  const boostAttr = threeState.nodePoints.geometry.getAttribute("aBoost");
  const alphaAttr = threeState.nodePoints.geometry.getAttribute("aAlpha");
  const whiteMixAttr = threeState.nodePoints.geometry.getAttribute("aWhiteMix");
  const motion = reduced ? 0 : threeState.motionScale;
  const pulseAge = Math.max(0, now - threeState.lastPulseAt);
  threeState.nodeRecords.forEach(record => {
    const amp = motion * record.amp;
    record.current.set(
      record.base.x + Math.sin(seconds * .31 + record.seedX) * amp,
      record.base.y + Math.sin(seconds * .27 + record.seedY) * amp * .82,
      record.base.z + Math.sin(seconds * .23 + record.seedZ) * amp * .68
    );
    record.anchor.position.copy(record.current);
    positionAttr.setXYZ(record.index, record.current.x, record.current.y, record.current.z);
    record.currentBoost = THREE.MathUtils.lerp(record.currentBoost, record.targetBoost, styleBlend);
    record.currentAlpha = THREE.MathUtils.lerp(record.currentAlpha, record.targetAlpha, styleBlend);
    record.currentWhiteMix = THREE.MathUtils.lerp(record.currentWhiteMix, record.targetWhiteMix, styleBlend);
    const pulse = !focusedNodeId && record.node.id === threeState.pulseNodeId ? .38 * Math.exp(-pulseAge / 620) : 0;
    boostAttr.setX(record.index, record.currentBoost + pulse);
    alphaAttr.setX(record.index, record.currentAlpha);
    whiteMixAttr.setX(record.index, record.currentWhiteMix);
  });
  positionAttr.needsUpdate = true;
  boostAttr.needsUpdate = true;
  alphaAttr.needsUpdate = true;
  whiteMixAttr.needsUpdate = true;
  const edgePositionAttr = threeState.edgeSegments?.geometry?.getAttribute("position");
  if (edgePositionAttr) {
    const intensityAttr = threeState.edgeSegments.geometry.getAttribute("aIntensity");
    threeState.edgeRecords.forEach(record => {
      const i = record.index * 2;
      edgePositionAttr.setXYZ(i, record.source.current.x, record.source.current.y, record.source.current.z);
      edgePositionAttr.setXYZ(i + 1, record.target.current.x, record.target.current.y, record.target.current.z);
      record.currentIntensity = THREE.MathUtils.lerp(record.currentIntensity, record.targetIntensity, styleBlend);
      intensityAttr.setX(i, record.currentIntensity);
      intensityAttr.setX(i + 1, record.currentIntensity);
    });
    edgePositionAttr.needsUpdate = true;
    intensityAttr.needsUpdate = true;
  }
  if (now - threeState.lastDebugAt >= 80) {
    threeState.lastDebugAt = now;
    const selectedRecord = focusedNodeId ? threeState.nodeRecordById.get(focusedNodeId) : null;
    const neighborRecord = focusedNodeId ? threeState.nodeRecords.find(record => isFocusedDirectNeighbor(record.node.id)) : null;
    const nonselectedRecord = focusedNodeId ? threeState.nodeRecords.find(record => record.node.id !== focusedNodeId && !isFocusedDirectNeighbor(record.node.id)) : null;
    const activeEdgeRecord = focusedNodeId ? threeState.edgeRecords.find(record => activatedEdgeKeys.has(edgeKey(record.link.source, record.link.target))) : null;
    const inactiveEdgeRecord = focusedNodeId ? threeState.edgeRecords.find(record => !activatedEdgeKeys.has(edgeKey(record.link.source, record.link.target))) : null;
    const pose = threeState.camera.position;
    const cameraDistance = threeState.camera.position.distanceTo(threeState.controls.target);
    const pointZoomScale = THREE.MathUtils.clamp(threeState.controls.minDistance / Math.max(threeState.controls.minDistance, cameraDistance), .28, 1);
    threeState.host.dataset.observedSelectedNodeAlpha = selectedRecord ? selectedRecord.currentAlpha.toFixed(3) : "";
    threeState.host.dataset.observedNonselectedNodeAlpha = nonselectedRecord ? nonselectedRecord.currentAlpha.toFixed(3) : "";
    threeState.host.dataset.observedNeighborNodeAlpha = neighborRecord ? neighborRecord.currentAlpha.toFixed(3) : "";
    threeState.host.dataset.observedNeighborNodeBoost = neighborRecord ? neighborRecord.currentBoost.toFixed(3) : "";
    threeState.host.dataset.observedNeighborWhiteMix = neighborRecord ? neighborRecord.currentWhiteMix.toFixed(3) : "";
    threeState.host.dataset.observedActiveEdgeIntensity = activeEdgeRecord ? activeEdgeRecord.currentIntensity.toFixed(3) : "";
    threeState.host.dataset.observedInactiveEdgeIntensity = inactiveEdgeRecord ? inactiveEdgeRecord.currentIntensity.toFixed(3) : "";
    threeState.host.dataset.cameraPose = [pose.x, pose.y, pose.z].map(value => value.toFixed(3)).join(",");
    threeState.host.dataset.pointZoomScale = pointZoomScale.toFixed(3);
    threeState.host.dataset.estimatedLargestPoint = Math.min(14, 12.7 * 1.1 * pointZoomScale).toFixed(2);
  }
}

function refreshThreeStyles() {
  if (!threeState) return;
  updateBloomState();
  updateEdgeFieldStyles();
  updateNodePointStyles();
  updateGraphLabels();
}

function updateBloomState() {
  if (!threeState?.bloomPass) return;
  const active = !!focusedNodeId || highlightedRels.size > 0 || highlightedNodeTypes.size > 0;
  threeState.bloomTarget = active
    ? { strength:.68, radius:.44, threshold:.1 }
    : { strength:.8, radius:.62, threshold:.08 };
  if (prefersReducedMotion()) Object.assign(threeState.bloomPass, threeState.bloomTarget);
}

function fitCamera3D(ms = 500, padding = 120) {
  if (!threeState?.currentData?.nodes?.length) return;
  const nodes = threeState.currentData.nodes.filter(n => isInteractiveNode(n));
  if (!nodes.length) return;
  const center = new THREE.Vector3();
  nodes.forEach(n => center.add(nodeWorldPosition(n)));
  center.multiplyScalar(1 / nodes.length);
  const distances = nodes.map(n => nodeWorldPosition(n).distanceTo(center)).sort((a, b) => a - b);
  const radius85 = Math.max(120, distances[Math.min(distances.length - 1, Math.floor(distances.length * .85))] || 1);
  const mobile = window.innerWidth <= 760;
  const desktopFit = layout === "overview" ? 1.62 : 1.72;
  const distance = (radius85 + padding * .18) * (mobile ? 2.12 : desktopFit);
  moveCamera3D(
    { x:center.x + distance * (mobile ? .04 : .08), y:center.y + distance * (mobile ? .12 : .16), z:center.z + distance * (mobile ? 1.04 : 1) },
    { x:center.x, y:center.y, z:center.z },
    ms
  );
}

function moveCamera3D(pos, lookAt, ms = 900) {
  if (!threeState) return;
  const { camera, controls } = threeState;
  const start = camera.position.clone();
  const targetStart = controls.target.clone();
  const end = new THREE.Vector3(pos.x, pos.y, pos.z);
  const targetEnd = new THREE.Vector3(lookAt.x, lookAt.y, lookAt.z);
  const started = performance.now();
  const tick = now => {
    const t = Math.min(1, (now - started) / Math.max(1, ms));
    const ease = t < .5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    camera.position.lerpVectors(start, end, ease);
    controls.target.lerpVectors(targetStart, targetEnd, ease);
    camera.lookAt(controls.target);
    if (t < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function threeColor(hex) {
  try { return new THREE.Color(hex || "#8A8472"); }
  catch { return new THREE.Color("#8A8472"); }
}

function litMaterial(color, opts = {}) {
  const c = threeColor(color);
  return new THREE.MeshStandardMaterial({
    color:c,
    emissive:c,
    emissiveIntensity:opts.emissive ?? .28,
    roughness:opts.roughness ?? .56,
    metalness:opts.metalness ?? .08,
    transparent:opts.transparent ?? true,
    opacity:opts.opacity ?? 1
  });
}

function spriteLabel(text, color, y, height, sub = "", opts = {}) {
  const inline = !!opts.inline;
  const size = inline ? Math.max(260, Math.ceil((text || "").length * 17 + 92))
    : Math.max(128, Math.ceil(Math.max((text || "").length, (sub || "").length * .78) * 18));
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = inline ? 64 : (sub ? 92 : 72);
  const ctx = canvas.getContext("2d");
  ctx.textBaseline = "middle";
  if (inline) {
    const accent = opts.accent || color;
    const cy = canvas.height / 2;
    ctx.shadowColor = accent;
    ctx.shadowBlur = 12;
    ctx.fillStyle = accent;
    ctx.beginPath(); ctx.arc(17, cy, 5.8, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = accent;
    ctx.globalAlpha = .72;
    ctx.lineWidth = 1.7;
    ctx.beginPath(); ctx.moveTo(30, cy); ctx.lineTo(58, cy); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.shadowColor = "rgba(3,7,17,.94)";
    ctx.shadowBlur = 8;
    ctx.font = "650 21px -apple-system, Segoe UI, Apple SD Gothic Neo, sans-serif";
    ctx.textAlign = "left";
    ctx.fillStyle = color;
    ctx.fillText(text || "", 66, cy + 1, canvas.width - 74);
  } else {
    ctx.font = "600 28px -apple-system, Segoe UI, Apple SD Gothic Neo, sans-serif";
    ctx.textAlign = "center";
    ctx.fillStyle = opts.bg || "rgba(3,7,17,.7)";
    roundRect(ctx, 4, 10, canvas.width - 8, canvas.height - 20, 13);
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = opts.stroke || "rgba(127,205,181,.18)";
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.fillText(text || "", canvas.width / 2, sub ? 38 : canvas.height / 2 + 1, canvas.width - 28);
    if (sub) {
      ctx.font = "500 19px -apple-system, Segoe UI, Apple SD Gothic Neo, sans-serif";
      ctx.fillStyle = "rgba(250,246,238,.66)";
      ctx.fillText(sub, canvas.width / 2, 65, canvas.width - 28);
    }
  }
  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  const material = new THREE.SpriteMaterial({ map:texture, transparent:true, depthWrite:false, depthTest:false, sizeAttenuation:opts.sizeAttenuation ?? false, opacity:.86 });
  const label = new THREE.Sprite(material);
  label.scale.set(height * (canvas.width / canvas.height), height, 1);
  label.position.set(opts.x ?? 0, y, 0);
  label.userData = {
    kind:"label",
    fadeStart:opts.fadeStart ?? 900,
    fadeEnd:opts.fadeEnd ?? 3300,
    minOpacity:opts.minOpacity ?? .12,
    maxOpacity:opts.maxOpacity ?? .9,
    forceVisible:opts.forceVisible ?? height >= 12
  };
  return label;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function ringMesh(radiusValue, tube, color, opacity) {
  const mesh = new THREE.Mesh(
    new THREE.TorusGeometry(radiusValue, tube, 10, 96),
    litMaterial(color, { opacity, emissive:.18, roughness:.48, metalness:.18 })
  );
  mesh.material.depthWrite = false;
  mesh.userData = { kind:"orbit", speed:0.001 + radiusValue * 0.000006 };
  return mesh;
}

function haloMesh(radiusValue, color, opacity) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(radiusValue, 32, 16),
    new THREE.MeshBasicMaterial({ color:threeColor(color), transparent:true, opacity, depthWrite:false, blending:THREE.AdditiveBlending })
  );
  mesh.userData = { kind:"glow", baseOpacity:opacity, amp:Math.min(0.045, opacity * .45), speed:.8 + radiusValue * .002, phase:radiusValue * .13 };
  return mesh;
}

function starBurstSprite(radiusValue, color, opacity) {
  const size = 256;
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");
  const cx = size / 2;
  const cy = size / 2;
  const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, cx);
  gradient.addColorStop(0, "rgba(255,255,255,1)");
  gradient.addColorStop(.08, "rgba(255,255,255,.92)");
  gradient.addColorStop(.24, "rgba(246,241,232,.32)");
  gradient.addColorStop(.62, "rgba(246,241,232,.06)");
  gradient.addColorStop(1, "rgba(246,241,232,0)");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, size, size);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.strokeStyle = "rgba(255,255,255,.68)";
  ctx.lineCap = "round";
  for (let i = 0; i < 28; i++) {
    const a = (i / 28) * Math.PI * 2;
    const inner = 11 + (i % 4) * 3;
    const outer = 64 + (i % 7) * 9;
    ctx.globalAlpha = .15 + (i % 5) * .045;
    ctx.lineWidth = i % 6 === 0 ? 1.35 : .7;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * inner, Math.sin(a) * inner);
    ctx.lineTo(Math.cos(a) * outer, Math.sin(a) * outer);
    ctx.stroke();
  }
  ctx.restore();
  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  const material = new THREE.SpriteMaterial({
    map:texture,
    color:threeColor(color),
    transparent:true,
    opacity,
    depthWrite:false,
    depthTest:false,
    blending:THREE.AdditiveBlending,
    sizeAttenuation:true
  });
  const sprite = new THREE.Sprite(material);
  sprite.scale.set(radiusValue, radiusValue, 1);
  sprite.userData = { kind:"glow", baseOpacity:opacity, amp:Math.min(.08, opacity * .75), speed:1.1 + radiusValue * .001, phase:radiusValue * .07 };
  return sprite;
}

function makeGalaxyField(n) {
  const color = HIER_COLOR.galaxy;
  const group = new THREE.Group();
  const r = 82 + hash01(n.id) * 16;
  const label = hierarchyLabel(n);
  const active = activatedNodeIds.has(n.id) || focusedNodeId === n.id || hoveredNodeId === n.id;
  group.add(haloMesh(r * 1.55, color, active ? 0.12 : 0.055));
  const outer = ringMesh(r, 1.25, color, 0.54);
  outer.rotation.x = Math.PI * .56;
  outer.rotation.y = hash01(`${n.id}:tilt`) * .7 - .35;
  const inner = ringMesh(r * .56, .7, "#FAF6EE", 0.18);
  inner.rotation.x = Math.PI * .56;
  inner.rotation.z = Math.PI * .18 + hash01(`${n.id}:spin`);
  const tilted = ringMesh(r * 1.28, .55, color, 0.16);
  tilted.rotation.x = Math.PI * .28;
  tilted.rotation.y = Math.PI * .28 + hash01(`${n.id}:tilted`) * .55;
  group.add(outer, inner, tilted, spriteLabel(label.title, "#FAF6EE", r * .82, 21, label.sub));
  return group;
}

function makeClusterField(n) {
  const color = HIER_COLOR.cluster;
  const group = new THREE.Group();
  const r = 42 + hash01(n.id) * 7;
  const label = hierarchyLabel(n);
  const active = activatedNodeIds.has(n.id) || focusedNodeId === n.id || hoveredNodeId === n.id;
  group.add(haloMesh(r * .86, color, active ? .105 : .045));
  const orbit = ringMesh(r, .8, color, .58);
  orbit.rotation.x = Math.PI * .55;
